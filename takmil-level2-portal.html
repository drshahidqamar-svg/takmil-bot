    <text x="100" y="120" text-anchor="middle" font-size="100" font-weight="900" fill="#D4A017" font-family="Arial">؟</text>

  table_food: `<svg viewBox="0 0 220 160" xmlns="http://www.w3.org/2000/svg">

<!-- ═══════════════════════════════════════════════════════════
     LAYER 3: PORTAL ENGINE
     Reads from QUESTION_BANK and IMAGE_LIB.

<style>
:root{--g:#01411C;--gm:#026B2F;--gl:#04A344;--gold:#F5C842;--w:#FFF;--tx:#1A2E1A}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Baloo 2',cursive;background:linear-gradient(145deg,#E8F8F5,#F5FFF8,#FFF8EC);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 10% 20%,rgba(4,163,68,.07) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(245,200,66,.07) 0%,transparent 40%)}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:680px;z-index:1;position:relative}
.screen.active{display:flex;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
.card{background:var(--w);border-radius:32px;padding:28px 24px;width:100%;box-shadow:0 8px 40px rgba(1,65,28,.15);border:2px solid rgba(4,163,68,.1)}
.logo-wrap{text-align:center;margin-bottom:20px}
.logo-icon{width:72px;height:72px;background:linear-gradient(135deg,var(--g),var(--gl));border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:34px;margin-bottom:8px;box-shadow:0 8px 28px rgba(1,65,28,.3);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.logo-title{font-size:30px;font-weight:800;color:var(--g)}
.logo-sub{font-size:12px;color:#4A7A4A;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.logo-ur{font-family:'Noto Nastaliq Urdu',serif;font-size:16px;color:#026B2F;direction:rtl;margin-top:5px}
.fl{font-size:12px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:block}
input{width:100%;padding:14px 16px;font-size:17px;font-family:'Baloo 2',cursive;font-weight:700;border:3px solid #C8E8D0;border-radius:14px;outline:none;color:var(--tx);background:#F5FFF8;transition:all .2s}
input:focus{border-color:var(--gl);box-shadow:0 0 0 4px rgba(4,163,68,.14);background:var(--w)}
input::placeholder{color:#AADABC;font-weight:400}
.fg{margin-bottom:14px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.sbtn{padding:14px 6px;border:3px solid #C8E8D0;border-radius:14px;background:#F5FFF8;cursor:pointer;text-align:center;transition:all .15s;font-family:'Baloo 2',cursive}
.sbtn .si{font-size:22px;display:block;margin-bottom:3px}
.sbtn .sn{font-size:12px;font-weight:700;color:var(--g)}
.sbtn.sel{border-color:var(--g);background:#E8F8EE;transform:scale(1.04)}
.btn-p{width:100%;padding:16px;background:linear-gradient(135deg,var(--g),var(--gm));color:var(--w);font-size:17px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:16px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,.35);transition:transform .15s;margin-top:4px}
.btn-p:active{transform:scale(.97)}
.err-msg{background:#FEE8E7;border:2px solid #F5C6C3;color:#C0392B;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-top:8px;display:none;text-align:center}
.err-msg.show{display:block;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.strip{width:100%;max-width:680px;background:var(--g);border-radius:14px;padding:9px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;z-index:1;box-shadow:0 4px 16px rgba(1,65,28,.2)}
.sn-n{font-size:14px;font-weight:800;color:var(--w);display:flex;align-items:center;gap:6px}
.sn-s{font-size:11px;color:rgba(255,255,255,.75);font-weight:600}
.pw{width:100%;margin-bottom:14px}
.pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pl{font-size:11px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1px}
.pc{font-size:19px;font-weight:800;color:var(--g)}
.pb{height:9px;background:#C8E8D0;border-radius:9px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--gl),var(--gold));border-radius:9px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.ibox{width:100%;background:linear-gradient(135deg,#F0FFF8,#E8F8EE);border:2.5px solid #C8E8D0;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;min-height:155px;padding:12px;overflow:hidden}
.ibox svg{max-width:100%;max-height:220px}
.qt{font-size:18px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:7px;line-height:1.4}
.qur{font-family:'Noto Nastaliq Urdu',serif;font-size:17px;color:#2E6B3E;direction:rtl;text-align:right;margin-bottom:12px;background:#F5FFF8;padding:9px 12px;border-radius:10px;border-right:4px solid var(--gl);line-height:2}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.abtn{padding:14px 11px;border:2.5px solid #C8E8D0;border-radius:16px;background:var(--w);cursor:pointer;transition:all .15s;text-align:center;box-shadow:0 3px 10px rgba(1,65,28,.08)}
.abtn:active{transform:scale(.95)}
.albl{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#E8F8EE;border-radius:7px;font-size:14px;font-weight:900;color:var(--g);margin-bottom:5px;transition:all .15s}
.atxt{font-size:14px;font-weight:700;color:var(--tx);display:block;line-height:1.3}
.aur{font-family:'Noto Nastaliq Urdu',serif;font-size:14px;color:#4A7A4A;direction:rtl;display:block;margin-top:2px}
.abtn:hover,.abtn.selected{border-color:var(--g);background:linear-gradient(135deg,#F0F8F2,#E8F5EC)}
.abtn.selected .albl{background:var(--g);color:var(--w)}
.abtn.cor{border-color:var(--gl);background:linear-gradient(135deg,#E8F8EE,#D4F0DE);animation:bounce .4s}
.abtn.cor .albl{background:var(--gl);color:var(--w)}
.abtn.wrg{border-color:#E74C3C;background:#FEF0EF;animation:wobble .4s}
.abtn.wrg .albl{background:#E74C3C;color:var(--w)}
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.05)}}
@keyframes wobble{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}
.fb{border-radius:14px;text-align:center;margin-bottom:12px;display:none;padding:0}
.fb.show{display:block;animation:popIn .3s}
.fb-inner{padding:14px 18px;border-radius:14px}
.fb-icon{font-size:28px;display:block;margin-bottom:5px}
.fb-main{font-size:19px;font-weight:800;display:block;margin-bottom:3px}
.fb-sub{font-size:13px;font-weight:600;display:block;opacity:.8}
.fb.cfb .fb-inner{background:#E8F8EE;color:var(--g);border:2.5px solid var(--gl)}
.fb.wfb .fb-inner{background:#FEF0EF;color:#C0392B;border:2.5px solid #F5A89F}
.btn-n{width:100%;padding:16px;background:linear-gradient(135deg,var(--g),var(--gm));color:var(--w);font-size:16px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:16px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,.3);display:none;transition:transform .15s}
.btn-n:active{transform:scale(.97)}
.btn-n.show{display:block;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
.sring{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--gl) 0%,var(--gl) var(--pct),#C8E8D0 var(--pct));display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(1,65,28,.2);position:relative}
.sring::before{content:'';position:absolute;width:105px;height:105px;background:var(--w);border-radius:50%}
.si2{position:relative;z-index:1;text-align:center}
.spct{font-size:30px;font-weight:900;color:var(--g)}
.slbl{font-size:10px;font-weight:700;color:#4A7A4A;letter-spacing:1px}
.rbadge{display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 22px;border-radius:50px;font-size:16px;font-weight:800;margin-bottom:14px}
.rbadge.pass{background:#E8F8EE;color:var(--g);border:2px solid var(--gl)}
.rbadge.fail{background:#FEF0EF;color:#C0392B;border:2px solid #F5A89F}
.tv-btn{width:100%;padding:12px;background:linear-gradient(135deg,#2C3E50,#1A252F);color:var(--w);font-size:14px;font-weight:700;font-family:'Baloo 2',cursive;border:none;border-radius:13px;cursor:pointer;margin-top:8px}
.tv-wrap{display:none;margin-top:14px}
.tv-wrap.show{display:block;animation:popIn .3s}
.tv-title{font-size:15px;font-weight:800;color:var(--g);margin-bottom:10px;text-align:center;padding:8px;background:#E8F8EE;border-radius:10px;border:2px solid var(--gl)}
.tv-row{display:flex;align-items:flex-start;gap:7px;padding:9px 11px;border-radius:10px;margin-bottom:7px;border:2px solid}
.tv-row.cor{background:#F0FFF8;border-color:#C8E8D0}
.tv-row.wrg{background:#FEF5F5;border-color:#F5C6C3}
.tv-q{flex:1;font-size:11px;color:#333;font-weight:600;line-height:1.4}
.tv-ans{text-align:right;font-size:11px;font-weight:700;min-width:100px}
.tv-mark{font-size:16px;margin-right:3px}
.spin{width:48px;height:48px;border:5px solid #C8E8D0;border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:36px auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.card{padding:20px 14px}.qt{font-size:15px}.atxt{font-size:12px}.agrid{gap:8px}}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="sc-setup">
  <div class="logo-wrap">
    <div class="logo-icon">📚</div>
    <div class="logo-title">TAKMIL</div>
    <div class="logo-sub">Level 2 — Assessment</div>
    <div class="logo-ur">سطح ۲ — امتحان</div>
  </div>
  <div class="card">
    <div class="fg"><label class="fl">PIN</label><input type="password" id="pin-in" placeholder="Enter PIN" maxlength="10" autocomplete="off"></div>
    <div class="fg"><label class="fl">Student Name — نام طالب علم</label><input type="text" id="name-in" placeholder="Full name" style="letter-spacing:0"></div>
    <div class="fg"><label class="fl">Subject — مضمون</label>
      <div class="sgrid">
        <button class="sbtn sel" onclick="selS('Math',this)"><span class="si">🔢</span><span class="sn">Math<br>ریاضی</span></button>
        <button class="sbtn" onclick="selS('English',this)"><span class="si">🔤</span><span class="sn">English<br>انگریزی</span></button>
        <button class="sbtn" onclick="selS('Urdu',this)"><span class="si" style="font-family:'Noto Nastaliq Urdu',serif;font-size:16px">اردو</span><span class="sn">Urdu</span></button>
      </div>
    </div>
    <button class="btn-p" onclick="start()">شروع کریں • Start ▶</button>
    <div class="err-msg" id="err">Please enter a valid PIN and student name.</div>
  </div>
</div>

<!-- LOADING -->
<div class="screen" id="sc-load"><div class="card" style="text-align:center"><div class="spin"></div><div style="font-size:15px;font-weight:700;color:#4A7A4A">Loading…</div></div></div>

<!-- STRIP -->
<div class="strip" id="strip" style="display:none"><div class="sn-n">👤 <span id="sn-txt"></span></div><div class="sn-s" id="ss-txt"></div></div>

<!-- QUESTION -->
<div class="screen" id="sc-q">
  <div class="card">
    <div class="pw"><div class="pt"><span class="pl">Question</span><span class="pc"><span id="qn">1</span>/<span id="qt">10</span></span></div><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div></div>
    <div class="ibox" id="ibox"></div>
    <div class="qt" id="qen"></div>
    <div class="qur" id="qur" style="display:none"></div>
    <div class="agrid" id="agrid"></div>
    <div class="fb" id="fb"><div class="fb-inner"><span class="fb-icon" id="fb-ico"></span><span class="fb-main" id="fb-main"></span><span class="fb-sub" id="fb-sub"></span></div></div>
    <button class="btn-n" id="btn-n" onclick="nextQ()">Next →</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="sc-res">
  <div class="card">
    <div class="logo-wrap" style="margin-bottom:12px">
      <div class="logo-icon" style="width:60px;height:60px;font-size:26px;animation:none">🏆</div>
      <div class="logo-title" style="font-size:20px">Assessment Complete!</div>
      <div class="logo-ur" style="font-size:14px">امتحان مکمل ہوگیا!</div>
    </div>
    <div style="text-align:center;font-size:13px;font-weight:700;color:#4A7A4A;margin-bottom:7px" id="rname"></div>
    <div style="text-align:center;margin:8px 0 16px"><div class="sring" id="sring" style="--pct:0%"><div class="si2"><div class="spct" id="rpct">0%</div><div class="slbl" id="rfrac">0/0</div></div></div></div>
    <div class="rbadge" id="rbadge">✅ PASSED</div>
    <div style="background:linear-gradient(135deg,#F0F8F2,#E8F5EC);border-radius:14px;border:2px solid #C8E8D0;padding:14px;text-align:center;margin-bottom:12px">
      <div style="font-size:30px;margin-bottom:5px">👩‍🏫</div>
      <div style="font-size:14px;font-weight:700;color:var(--g)">Please give the tablet to your teacher</div>
      <div style="font-family:'Noto Nastaliq Urdu',serif;font-size:13px;color:#4A7A4A;direction:rtl;margin-top:4px">براہ کرم ٹیبلیٹ استاد کو دیں</div>
    </div>
    <button class="tv-btn" onclick="toggleTV()">👩‍🏫 Teacher Summary — استاد کا خلاصہ</button>
    <div class="tv-wrap" id="tv-wrap"><div class="tv-title">📋 Answer Sheet</div><div id="tv-rows"></div></div>
    <button class="btn-p" onclick="reset()" style="margin-top:10px;background:linear-gradient(135deg,#4A6B4A,#2E4E2E)">New Student — نیا طالب علم</button>
  </div>
</div>

<script>
// ── ENGINE ────────────────────────────────────────────────────
let G={subj:'Math',name:'',qs:[],cur:0,score:0,done:false,log:[]};
const LBL=['A','B','C','D'];

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function selS(s,el){G.subj=s;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel')}

async function start(){
  const pin=document.getElementById('pin-in').value.trim();
  const name=document.getElementById('name-in').value.trim();
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(pin.length<4){err.textContent='Please enter a valid PIN.';err.classList.add('show');return}
  if(name.length<2){err.textContent='Please enter the student name.';err.classList.add('show');return}
  show('sc-load');
  G.name=name;G.cur=0;G.score=0;G.done=false;G.log=[];
  const bank=[...(QUESTION_BANK[G.subj]||[])];
  for(let i=bank.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bank[i],bank[j]]=[bank[j],bank[i]]}
  G.qs=bank.slice(0,Math.min(10,bank.length));
  try{await fetch('/portal/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin,studentName:name})})}catch(e){}
  document.getElementById('sn-txt').textContent=name;
  document.getElementById('ss-txt').textContent=`${G.subj} • Level 2`;
  document.getElementById('strip').style.display='flex';
  renderQ(0);show('sc-q');
}

function renderQ(idx){
  G.done=false;
  const q=G.qs[idx],tot=G.qs.length;
  document.getElementById('qn').textContent=idx+1;
  document.getElementById('qt').textContent=tot;
  document.getElementById('pf').style.width=`${(idx/tot)*100}%`;
  // Layer 2: image from library by ID only
  const svg=IMAGE_LIB[q.img]||`<svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg"><rect width="200" height="140" rx="14" fill="#ECF0F1"/><text x="100" y="78" text-anchor="middle" font-size="14" fill="#888" font-family="Arial">Image: ${q.img}</text></svg>`;
  document.getElementById('ibox').innerHTML=svg;
  // Layer 1: question text from bank only
  document.getElementById('qen').textContent=q.q_en;
  const ur=document.getElementById('qur');
  if(q.q_ur){ur.textContent=q.q_ur;ur.style.display='block'}else ur.style.display='none';
  // Render options — HTML only, never SVG
  const grid=document.getElementById('agrid');
  grid.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='abtn';btn.dataset.i=i;
    const isUr=/[\u0600-\u06FF]/.test(opt);
    btn.innerHTML=`<span class="albl">${LBL[i]}</span><span class="atxt${isUr?' aur':''}">${opt}</span>`;
    btn.onclick=()=>pick(i);
    grid.appendChild(btn);
  });
  document.getElementById('fb').className='fb';
  document.getElementById('btn-n').classList.remove('show');
}

function pick(idx){
  if(G.done)return;G.done=true;
  const q=G.qs[G.cur];
  const right=idx===q.ans;
  if(right)G.score++;
  G.log.push({q:q.q_en.slice(0,60),chosen:q.opts[idx],correct:q.opts[q.ans],right});
  document.querySelectorAll('.abtn').forEach(b=>{
    const i=parseInt(b.dataset.i);
    if(i===q.ans)b.classList.add('cor');
    else if(i===idx&&!right)b.classList.add('wrg');
  });
  const fb=document.getElementById('fb');
  document.getElementById('fb-ico').textContent=right?'🌟':'❌';
  document.getElementById('fb-main').textContent=right?'Correct! — درست جواب':'Wrong! — غلط جواب';
  document.getElementById('fb-sub').textContent=right?'Well done! شاباش!':`Answer: ${q.opts[q.ans]}`;
  fb.className=`fb show ${right?'cfb':'wfb'}`;
  const nb=document.getElementById('btn-n');
  nb.textContent=G.cur>=G.qs.length-1?'🎓 See Results':'Next Question →';
  nb.classList.add('show');
}

function nextQ(){G.cur++;G.cur<G.qs.length?(renderQ(G.cur),window.scrollTo(0,0)):showResults()}

function showResults(){
  const tot=G.qs.length,pct=Math.round((G.score/tot)*100),pass=pct>=70;
  document.getElementById('rname').textContent=G.name;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rfrac').textContent=`${G.score}/${tot}`;
  document.getElementById('sring').style.setProperty('--pct',pct+'%');
  const rb=document.getElementById('rbadge');
  rb.textContent=pass?'✅ PASSED — کامیاب 🌟':'📚 Keep Trying — مزید محنت کریں';
  rb.className=`rbadge ${pass?'pass':'fail'}`;
  const rows=document.getElementById('tv-rows');rows.innerHTML='';
  G.log.forEach((l,i)=>{const d=document.createElement('div');d.className=`tv-row ${l.right?'cor':'wrg'}`;d.innerHTML=`<span class="tv-mark">${l.right?'✅':'❌'}</span><div class="tv-q">Q${i+1}: ${l.q}…</div><div class="tv-ans"><div style="color:#2980B9">Student: ${l.chosen}</div><div style="color:${l.right?'#01411C':'#C0392B'}">Answer: ${l.correct}</div></div>`;rows.appendChild(d)});
  document.getElementById('strip').style.display='none';show('sc-res');
}

function toggleTV(){document.getElementById('tv-wrap').classList.toggle('show')}

function reset(){
  G={subj:'Math',name:'',qs:[],cur:0,score:0,done:false,log:[]};
  document.getElementById('name-in').value='';document.getElementById('pin-in').value='';
  document.getElementById('err').classList.remove('show');
  document.getElementById('strip').style.display='none';
  document.getElementById('tv-wrap').classList.remove('show');
  document.querySelectorAll('.sbtn').forEach((b,i)=>b.classList.toggle('sel',i===0));
  show('sc-setup');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')start()});
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('sc-q').classList.contains('active'))return;
    const m={a:0,b:1,c:2,d:3,A:0,B:1,C:2,D:3};
    if(m[e.key]!==undefined)pick(m[e.key]);
    if(e.key==='Enter'){const nb=document.getElementById('btn-n');if(nb.classList.contains('show'))nextQ()}
  });
});
