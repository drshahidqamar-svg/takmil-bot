<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKMIL — Assessment Results</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2e7a;--navy2:#0f1d54;--orange:#F74F22;
  --green:#16a34a;--green2:#dcfce7;
  --red:#ef4444;--red2:#fee2e2;
  --amber:#f59e0b;--amber2:#fef9c3;
  --bg:#f5f7ff;--bg2:#ffffff;--border:#e0e4f5;
  --text:#1a1f3a;--text2:#4a5080;--text3:#8a90b8;
  --r:14px;--r2:10px;--shadow:0 2px 12px rgba(26,46,122,0.07);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:20;box-shadow:0 1px 8px rgba(0,0,0,0.05)}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.logo-sub{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.nav{display:flex;gap:8px}
.nav a{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;
  text-decoration:none;color:var(--text2);transition:all 0.2s}
.nav a:hover,.nav a.active{background:var(--green2);color:var(--green)}

/* FILTERS */
.filters{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.f-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px}
.f-inp{padding:7px 12px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--r2);font-size:13px;color:var(--text);
  font-family:'DM Sans',sans-serif;outline:none}
.f-inp:focus{border-color:var(--navy)}
.refresh-btn{margin-left:auto;padding:7px 18px;background:var(--navy);border:none;
  border-radius:var(--r2);font-size:12px;font-weight:700;color:white;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.refresh-btn:hover{background:var(--navy2)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;
  background:var(--border);border-bottom:1px solid var(--border)}
.stat{background:var(--bg2);padding:16px 20px;text-align:center}
.stat-n{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-l{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-top:3px}

/* BODY */
.body{padding:20px 28px;max-width:1400px;margin:0 auto}

/* SESSION TABLE */
.table-card{background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:10px 14px;color:var(--text3);font-weight:700;
  font-size:11px;text-transform:uppercase;letter-spacing:0.5px;
  background:var(--bg);border-bottom:2px solid var(--border)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:#f8f9ff;cursor:pointer}
.tbl tr:last-child td{border-bottom:none}

.score-pill{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:13px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.b-pass{background:var(--green2);color:var(--green)}
.b-fail{background:var(--red2);color:var(--red)}
.b-pending{background:var(--amber2);color:#92400e}

.bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:60px;display:inline-block}
.bar-fill{height:100%;border-radius:3px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);
  display:none;align-items:center;justify-content:center;z-index:100;
  backdrop-filter:blur(4px);padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border-radius:20px;width:100%;max-width:680px;
  max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.15);
  animation:modal-in 0.25s ease}
@keyframes modal-in{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.modal-sub{font-size:12px;color:var(--text3);margin-top:2px}
.modal-close{background:var(--bg);border:none;width:28px;height:28px;
  border-radius:50%;cursor:pointer;font-size:14px;color:var(--text2)}
.modal-body{padding:20px 24px}

/* Cohort summary */
.cohort-box{border-radius:var(--r2);padding:16px 20px;margin-bottom:16px;text-align:center}
.cb-pass{background:var(--green2);border:1.5px solid #86efac}
.cb-fail{background:var(--red2);border:1.5px solid #fca5a5}
.cb-pending{background:var(--amber2);border:1.5px solid #fde047}
.cb-n{font-family:'Syne',sans-serif;font-size:36px;font-weight:900}
.cb-l{font-size:13px;font-weight:700;color:var(--text2);margin-top:4px}

/* Student rows */
.s-row{display:flex;align-items:center;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border)}
.s-row:last-child{border-bottom:none}
.s-num{font-size:12px;color:var(--text3);font-weight:600;min-width:20px}
.s-name{flex:1;font-size:14px;font-weight:700;color:var(--text)}
.s-score{font-size:18px;font-weight:900}
.s-bar{flex:1;max-width:100px}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--text3)}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--navy);
  border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px;color:var(--text3);font-size:14px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="logo">TAKMIL — Assessment Results</div>
    <div class="logo-sub">All Sessions & Scores</div>
  </div>
  <div class="nav">
    <a href="/">🏠 Hub</a>
    <a href="/assess">📝 Assess</a>
    <a href="/feedback">📋 Feedback</a>
    <a href="/analytics">📊 Analytics</a>
    <a href="/results" class="active">🎯 Results</a>
  </div>
</div>

<div class="filters">
  <span class="f-lbl">School</span>
  <input type="text" class="f-inp" id="f-school" placeholder="School code..." style="min-width:200px" oninput="load()">
  <span class="f-lbl">Level</span>
  <select class="f-inp" id="f-level" onchange="load()">
    <option value="">All Levels</option>
    ${Array.from({length:12},(_,i)=>`<option value="${i+1}">Level ${i+1}${i===11?' (Grand)':''}</option>`).join('')}
  </select>
  <span class="f-lbl">From</span>
  <input type="date" class="f-inp" id="f-from" onchange="load()">
  <span class="f-lbl">To</span>
  <input type="date" class="f-inp" id="f-to" onchange="load()">
  <button class="refresh-btn" onclick="load()">↻ Refresh</button>
</div>

<div class="stats" id="stats">
  <div class="stat"><div class="stat-n" id="s-sessions" style="color:var(--navy)">—</div><div class="stat-l">Sessions</div></div>
  <div class="stat"><div class="stat-n" id="s-students" style="color:var(--navy)">—</div><div class="stat-l">Students</div></div>
  <div class="stat"><div class="stat-n" id="s-passed" style="color:var(--green)">—</div><div class="stat-l">Passed</div></div>
  <div class="stat"><div class="stat-n" id="s-avg" style="color:var(--orange)">—</div><div class="stat-l">Avg Score</div></div>
  <div class="stat"><div class="stat-n" id="s-cohorts" style="color:var(--green)">—</div><div class="stat-l">Cohorts Passed</div></div>
</div>

<div class="body">
  <div class="table-card">
    <div id="table-body">
      <div class="loading"><div class="spin"></div><p>Loading results...</p></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="m-title">Session Detail</div>
        <div class="modal-sub" id="m-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script>
// Generate level options
document.getElementById('f-level').innerHTML =
  '<option value="">All Levels</option>' +
  Array.from({length:12},(_,i)=>`<option value="${i+1}">Level ${i+1}${i===11?' (Grand)':''}</option>`).join('');

function fmtDate(d){ return d ? new Date(d).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}) : '—'; }
function fmtTime(d){ return d ? new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—'; }
function fmtSchool(n){ return (n||'').replace(/_O_|_A_|_B_|_C_/,' ').replace(/_W\d+[A-Z]+$/,'').replace(/_/g,' '); }
function colorForPct(p){ return p>=80?'#16a34a':p>=60?'#f59e0b':'#ef4444'; }

async function load(){
  const school   = document.getElementById('f-school').value.trim();
  const level    = document.getElementById('f-level').value;
  const dateFrom = document.getElementById('f-from').value;
  const dateTo   = document.getElementById('f-to').value;

  let url = '/api/results/sessions?';
  if(school)   url += `school=${encodeURIComponent(school)}&`;
  if(level)    url += `level=${level}&`;
  if(dateFrom) url += `date_from=${dateFrom}&`;
  if(dateTo)   url += `date_to=${dateTo}&`;

  document.getElementById('table-body').innerHTML =
    '<div class="loading"><div class="spin"></div><p>Loading...</p></div>';

  try {
    const resp = await fetch(url);
    const data = await resp.json();
    const sessions = data.sessions || [];

    // Stats
    const totalStudents = sessions.reduce((a,s)=>a+parseInt(s.student_count||0),0);
    const totalPassed   = sessions.reduce((a,s)=>a+parseInt(s.passed_count||0),0);
    const avgAll        = sessions.length
      ? Math.round(sessions.reduce((a,s)=>a+parseFloat(s.avg_score||0),0)/sessions.length) : 0;
    const cohortsPassed = sessions.filter(s=>parseFloat(s.avg_score||0)>=80).length;

    document.getElementById('s-sessions').textContent = sessions.length;
    document.getElementById('s-students').textContent = totalStudents;
    document.getElementById('s-passed').textContent   = totalPassed;
    document.getElementById('s-avg').textContent      = avgAll+'%';
    document.getElementById('s-cohorts').textContent  = cohortsPassed;

    if(!sessions.length){
      document.getElementById('table-body').innerHTML =
        '<div class="empty">No assessment sessions found.<br>Generate a PIN at <a href="/assess">/assess</a> to run your first assessment.</div>';
      return;
    }

    document.getElementById('table-body').innerHTML = `
      <table class="tbl">
        <tr>
          <th>Date</th><th>School</th><th>Level</th>
          <th>Students</th><th>Avg Score</th><th>Passed</th><th>Status</th>
        </tr>
        ${sessions.map(s=>{
          const avg  = parseFloat(s.avg_score||0);
          const cnt  = parseInt(s.student_count||0);
          const pass = parseInt(s.passed_count||0);
          const cohortOk = avg >= 80;
          const pct  = avg.toFixed(0);
          return `<tr onclick="showSession(${s.id})">
            <td>
              <div style="font-weight:700">${fmtDate(s.created_at)}</div>
              <div style="font-size:11px;color:var(--text3)">${fmtTime(s.created_at)}</div>
            </td>
            <td>
              <div style="font-weight:700">${fmtSchool(s.school_name||s.school_identifier)}</div>
              <div style="font-size:11px;color:var(--text3)">${s.school_identifier}</div>
            </td>
            <td><span style="font-weight:800;color:var(--navy)">L${s.level}</span></td>
            <td style="font-weight:700">${cnt}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${colorForPct(avg)}"></div></div>
                <span style="font-weight:800;color:${colorForPct(avg)}">${cnt>0?pct+'%':'—'}</span>
              </div>
            </td>
            <td style="font-weight:700">${cnt>0?pass+'/'+cnt:'—'}</td>
            <td>
              ${cnt===0
                ? '<span class="badge b-pending">No Students</span>'
                : cohortOk
                  ? '<span class="badge b-pass">✅ Cohort Passed</span>'
                  : '<span class="badge b-fail">📚 Re-assess</span>'}
            </td>
          </tr>`;
        }).join('')}
      </table>`;
  } catch(e){
    document.getElementById('table-body').innerHTML =
      `<div class="empty" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function showSession(id){
  document.getElementById('modal').classList.add('on');
  document.getElementById('m-body').innerHTML = '<div class="loading"><div class="spin"></div></div>';

  try {
    const resp = await fetch(`/api/results/session/${id}`);
    const data = await resp.json();
    const sess = data.session;
    const students = data.students || [];
    const avg  = data.avgScore || 0;
    const pass = students.filter(s=>s.passed).length;

    document.getElementById('m-title').textContent =
      `${fmtSchool(sess?.school_name||sess?.school_identifier)} — Level ${sess?.level}`;
    document.getElementById('m-sub').textContent =
      `${fmtDate(sess?.created_at)} · PIN: ${sess?.pin_code} · ${students.length} students`;

    const boxClass = avg>=80?'cb-pass':avg>=60?'cb-pending':'cb-fail';
    let html = `
      <div class="cohort-box ${boxClass}">
        <div class="cb-n" style="color:${colorForPct(avg)}">${avg}%</div>
        <div class="cb-l">Class Average · ${pass}/${students.length} students passed</div>
        <div style="margin-top:8px;font-size:13px;font-weight:700;color:${avg>=80?'#15803d':'#991b1b'}">
          ${avg>=80?'✅ Cohort passed — Advancement requested':'📚 Below 80% — Re-assessment needed'}
        </div>
      </div>`;

    if(!students.length){
      html += '<div style="text-align:center;padding:20px;color:var(--text3)">No student results saved for this session yet.</div>';
    } else {
      html += students.map((s,i)=>{
        const pct = parseFloat(s.score_pct||0);
        return `<div class="s-row">
          <div class="s-num">${i+1}</div>
          <div class="s-name">${s.student_name}</div>
          <div class="s-bar">
            <div class="bar" style="width:100%">
              <div class="bar-fill" style="width:${pct}%;background:${colorForPct(pct)}"></div>
            </div>
          </div>
          <div class="s-score" style="color:${colorForPct(pct)}">${pct.toFixed(0)}%</div>
          <span class="badge ${s.passed?'b-pass':'b-fail'}">${s.passed?'✅ Pass':'📚 Retry'}</span>
        </div>`;
      }).join('');
    }

    document.getElementById('m-body').innerHTML = html;
  } catch(e){
    document.getElementById('m-body').innerHTML = `<p style="color:var(--red)">Error: ${e.message}</p>`;
  }
}

function closeModal(){
  document.getElementById('modal').classList.remove('on');
}

// Set default date range — last 30 days
const today = new Date();
const month = new Date(today); month.setDate(month.getDate()-30);
document.getElementById('f-to').value   = today.toISOString().split('T')[0];
document.getElementById('f-from').value = month.toISOString().split('T')[0];
load();
setInterval(load, 60000);
</script>
</body>
</html>
