<style>
:root{--g:#01411C;--gm:#026B2F;--gl:#04A344;--gold:#F5C842;--w:#FFF;--tx:#1A2E1A}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Baloo 2',cursive;background:linear-gradient(145deg,#E8F8F5,#F5FFF8,#FFF8EC);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 10% 20%,rgba(4,163,68,.07),transparent 40%),radial-gradient(circle at 90% 80%,rgba(245,200,66,.07),transparent 40%)}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:680px;z-index:1;position:relative}
.screen.active{display:flex;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
.card{background:var(--w);border-radius:28px;padding:26px 22px;width:100%;box-shadow:0 8px 40px rgba(1,65,28,.15);border:2px solid rgba(4,163,68,.1)}
/* Login */
.logo-icon{width:70px;height:70px;background:linear-gradient(135deg,var(--g),var(--gl));border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:8px;box-shadow:0 8px 28px rgba(1,65,28,.3);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.logo-title{font-size:28px;font-weight:800;color:var(--g);text-align:center}
.logo-sub{font-size:11px;color:#4A7A4A;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:2px}
.logo-ur{font-family:'Noto Nastaliq Urdu',serif;font-size:15px;color:#026B2F;direction:rtl;text-align:center;margin-top:4px}
.fl{font-size:11px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;display:block}
.fg{margin-bottom:13px}
input{width:100%;padding:13px 15px;font-size:16px;font-family:'Baloo 2',cursive;font-weight:700;border:3px solid #C8E8D0;border-radius:13px;outline:none;color:var(--tx);background:#F5FFF8;transition:all .2s}
input:focus{border-color:var(--gl);box-shadow:0 0 0 4px rgba(4,163,68,.14);background:var(--w)}
input::placeholder{color:#AADABC;font-weight:400}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:12px}
.sbtn{padding:13px 6px;border:3px solid #C8E8D0;border-radius:13px;background:#F5FFF8;cursor:pointer;text-align:center;transition:all .15s;font-family:'Baloo 2',cursive}
.sbtn .si{font-size:22px;display:block;margin-bottom:3px}
.sbtn .sn{font-size:11px;font-weight:700;color:var(--g)}
.sbtn .snu{font-family:'Noto Nastaliq Urdu',serif;font-size:11px;color:var(--gm);display:block}
.sbtn.sel{border-color:var(--g);background:#E8F8EE;transform:scale(1.04)}
/* Buttons */
.btn-p{width:100%;padding:15px;background:linear-gradient(135deg,var(--g),var(--gm));color:var(--w);font-size:16px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:15px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,.35);transition:transform .15s;margin-top:3px}
.btn-p:active{transform:scale(.97)}

.err-msg.show{display:block;animation:shake .4s}

/* Strip */
.strip{width:100%;max-width:680px;background:var(--g);border-radius:13px;padding:9px 15px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;z-index:1;box-shadow:0 4px 16px rgba(1,65,28,.2)}

/* Progress */
.pw{width:100%;margin-bottom:12px}
.pt{display:flex;justify-content:space-between;margin-bottom:4px}
.pl{font-size:10px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1px}

.pb{height:9px;background:#C8E8D0;border-radius:9px;overflow:hidden}

/* Image box */
.ibox{width:100%;background:linear-gradient(135deg,#F0FFF8,#E8F8EE);border:2.5px solid #C8E8D0;border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;min-height:150px;padding:11px;overflow:hidden}
.ibox svg{max-width:100%;max-height:215px}

.qt{font-size:17px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:6px;line-height:1.4}
.qt.ur{font-family:'Noto Nastaliq Urdu',serif;direction:rtl;font-size:19px}
.qur{font-family:'Noto Nastaliq Urdu',serif;font-size:16px;color:#2E6B3E;direction:rtl;text-align:right;margin-bottom:11px;background:#F5FFF8;padding:8px 11px;border-radius:9px;border-right:4px solid var(--gl);line-height:2.1}
/* Options */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.abtn{padding:13px 10px;border:2.5px solid #C8E8D0;border-radius:15px;background:var(--w);cursor:pointer;transition:all .15s;text-align:center;box-shadow:0 3px 10px rgba(1,65,28,.07)}
.abtn:active{transform:scale(.95)}
.albl{display:inline-flex;align-items:center;justify-content:center;width:27px;height:27px;background:#E8F8EE;border-radius:7px;font-size:13px;font-weight:900;color:var(--g);margin-bottom:5px;transition:all .15s}
.atxt{font-size:13px;font-weight:700;color:var(--tx);display:block;line-height:1.4}
.atxt.ur{font-family:'Noto Nastaliq Urdu',serif;font-size:15px;direction:rtl;line-height:2}
.abtn.sel{border-color:var(--g);background:linear-gradient(135deg,#F0F8F2,#E8F5EC)}

.abtn.cor{border-color:var(--gl);background:linear-gradient(135deg,#E8F8EE,#D4F0DE);animation:bounce .4s}
.abtn.cor .albl{background:var(--gl);color:var(--w)}
.abtn.wrg{border-color:#E74C3C;background:#FEF0EF;animation:wobble .4s}
.abtn.wrg .albl{background:#E74C3C;color:var(--w)}
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.05)}}
@keyframes wobble{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}
/* Feedback */
.fb{border-radius:13px;margin-bottom:11px;display:none}
.fb.show{display:block;animation:popIn .3s}
.fb-inner{padding:13px 16px;border-radius:13px;text-align:center}
.fb-icon{font-size:26px;display:block;margin-bottom:4px}
.fb-main{font-size:17px;font-weight:800;display:block;margin-bottom:2px}
.fb-sub{font-size:12px;font-weight:600;display:block;opacity:.8}
.fb.cfb .fb-inner{background:#E8F8EE;color:var(--g);border:2.5px solid var(--gl)}
.fb.wfb .fb-inner{background:#FEF0EF;color:#C0392B;border:2.5px solid #F5A89F}
.btn-n{width:100%;padding:15px;background:linear-gradient(135deg,var(--g),var(--gm));color:var(--w);font-size:15px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:15px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,.3);display:none;transition:transform .15s}
.btn-n:active{transform:scale(.97)}
.btn-n.show{display:block;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
/* Results */
.sring{width:138px;height:138px;border-radius:50%;background:conic-gradient(var(--gl) 0%,var(--gl) var(--pct),#C8E8D0 var(--pct));display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(1,65,28,.2);position:relative}
.sring::before{content:'';position:absolute;width:104px;height:104px;background:var(--w);border-radius:50%}
.ri{position:relative;z-index:1;text-align:center}
.spct{font-size:28px;font-weight:900;color:var(--g)}
.slbl{font-size:10px;font-weight:700;color:#4A7A4A;letter-spacing:1px}
.rbadge{display:flex;align-items:center;justify-content:center;gap:7px;padding:8px 20px;border-radius:50px;font-size:15px;font-weight:800;margin-bottom:12px}
.rbadge.pass{background:#E8F8EE;color:var(--g);border:2px solid var(--gl)}
.rbadge.fail{background:#FEF0EF;color:#C0392B;border:2px solid #F5A89F}
.breakdown{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.bk-card{border-radius:10px;padding:10px;text-align:center;border:2px solid}
.tv-btn{width:100%;padding:11px;background:linear-gradient(135deg,#2C3E50,#1A252F);color:var(--w);font-size:13px;font-weight:700;font-family:'Baloo 2',cursive;border:none;border-radius:12px;cursor:pointer;margin-top:7px}
.tv-wrap{display:none;margin-top:12px}
.tv-wrap.show{display:block}
.tv-title{font-size:13px;font-weight:800;color:var(--g);margin-bottom:8px;text-align:center;padding:7px;background:#E8F8EE;border-radius:8px;border:2px solid var(--gl)}
.tv-row{display:flex;align-items:flex-start;gap:6px;padding:8px 10px;border-radius:9px;margin-bottom:6px;border:2px solid}

.tv-row.wrg{background:#FEF5F5;border-color:#F5C6C3}
.tv-q{flex:1;font-size:10px;color:#333;font-weight:600;line-height:1.4}
.tv-a{font-size:10px;font-weight:700;min-width:100px;text-align:right}
.spin{width:46px;height:46px;border:5px solid #C8E8D0;border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:34px auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.card{padding:18px 12px}.qt{font-size:14px}.atxt{font-size:12px}.agrid{gap:7px}}
</style>
</head>
<body>

<!-- ── SCREEN 1: LOGIN ──────────────────────────────────── -->
<div class="screen active" id="sc-login">
  <div style="text-align:center;margin-bottom:18px">
    <div class="logo-icon">📚</div>

  <div class="card">
    <div class="fg"><label class="fl">PIN</label>
      <input type="password" id="pin-in" placeholder="Enter PIN from teacher" maxlength="10" autocomplete="off"></div>
    <div class="fg"><label class="fl">Your Name — اپنا نام لکھیں</label>
      <input type="text" id="name-in" placeholder="Full name" style="letter-spacing:0"></div>
    <div class="fg"><label class="fl">Subject — مضمون</label>
      <div class="sgrid">
        <button class="sbtn sel" onclick="selS('Math',this)"><span class="si">🔢</span><span class="sn">Math<span class="snu">ریاضی</span></span></button>
        <button class="sbtn" onclick="selS('English',this)"><span class="si">🔤</span><span class="sn">English<span class="snu">انگریزی</span></span></button>
        <button class="sbtn" onclick="selS('Urdu',this)"><span class="si" style="font-family:'Noto Nastaliq Urdu',serif;font-size:18px">اردو</span><span class="sn">Urdu<span class="snu">اردو</span></span></button>

<div class="screen" id="sc-load"><div class="card" style="text-align:center"><div class="spin"></div><div style="font-size:14px;font-weight:700;color:#4A7A4A">Loading…</div></div></div>

<!-- STRIP -->
<div class="strip" id="strip" style="display:none">
  <div class="s-name">👤 <span id="s-nm"></span></div>

<div class="screen" id="sc-q">
  <div class="card">
    <div class="pw">
      <div class="pt"><span class="pl">Question</span><span class="pc"><span id="qn">1</span>/<span id="qt">12</span></span></div>
      <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    </div>
    <!-- LAYER 2 image rendered here by ID — never contains answer text -->
    <div class="ibox" id="ibox"></div>
    <!-- LAYER 1 question text -->
    <div class="qt" id="qen"></div>
    <div class="qur" id="qur" style="display:none"></div>
    <!-- LAYER 1 options rendered in HTML — never from SVG -->
    <div class="agrid" id="agrid"></div>
    <div class="fb" id="fb"><div class="fb-inner"><span class="fb-icon" id="fbi"></span><span class="fb-main" id="fbm"></span><span class="fb-sub" id="fbs"></span></div></div>

</div>

<!-- ── SCREEN 4: RESULTS ────────────────────────────────── -->
<div class="screen" id="sc-res">
  <div class="card">
    <div style="text-align:center;margin-bottom:11px">
      <div class="logo-icon" style="width:58px;height:58px;font-size:24px;animation:none">🏆</div>
      <div class="logo-title" style="font-size:19px">Assessment Complete!</div>
      <div class="logo-ur" style="font-size:13px">امتحان مکمل ہوگیا!</div>
    </div>
    <div style="text-align:center;font-size:12px;font-weight:700;color:#4A7A4A;margin-bottom:4px" id="res-nm"></div>

      <div class="sring" id="sring" style="--pct:0%"><div class="ri"><div class="spct" id="rpct">0%</div><div class="slbl" id="rfrac">0/0</div></div></div>

<!-- ── LAYER 3: ENGINE ──────────────────────────────────── -->
<script>
const G = {
  pin:'', name:'', subj:'Math',
  qs:[], cur:0, score:0, picS:0, txtS:0, picT:0, txtT:0,
  done:false, log:[]
};
const LBL = ['A','B','C','D'];

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function selS(s,el){
  G.subj=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

async function start(){
  const pin=document.getElementById('pin-in').value.trim();
  const name=document.getElementById('name-in').value.trim();
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(pin.length<4){err.textContent='Please enter a valid PIN.';err.classList.add('show');return}
  if(name.length<2){err.textContent='Please enter your name.';err.classList.add('show');return}
  G.pin=pin; G.name=name;
  G.cur=0; G.score=0; G.picS=0; G.txtS=0; G.picT=0; G.txtT=0;
  G.done=false; G.log=[];
  show('sc-load');

  // Shuffle questions
  const bank = [...(QB_L3[G.subj]||[])];
  for(let i=bank.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bank[i],bank[j]]=[bank[j],bank[i]];}
  G.qs = bank.slice(0, Math.min(12, bank.length));

  try{
    await fetch('/portal/session/start',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pin:G.pin,studentName:G.name})});
  }catch(e){}

  document.getElementById('s-nm').textContent=G.name;
  document.getElementById('s-subj').textContent=G.subj;
  document.getElementById('qt').textContent=G.qs.length;
  document.getElementById('strip').style.display='flex';
  renderQ(0); show('sc-q');
}

function renderQ(idx){
  G.done=false;
  const q=G.qs[idx], tot=G.qs.length;
  document.getElementById('qn').textContent=idx+1;
  document.getElementById('pf').style.width=`${(idx/tot)*100}%`;

  // LAYER 2: fetch SVG from library by ID — never generates text
  const svg = IMGS_L3[q.img] ||
    `<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
       <rect width="200" height="100" rx="12" fill="#ECF0F1"/>
       <text x="100" y="56" text-anchor="middle" font-size="11" fill="#888" font-family="Arial">img: ${q.img}</text>
     </svg>`;
  document.getElementById('ibox').innerHTML = svg;

  // LAYER 1: question text — from JSON only
  const isUr = /[\u0600-\u06FF]/.test(q.q_en);
  const qenEl = document.getElementById('qen');
  qenEl.textContent = q.q_en;
  if(isUr){
    qenEl.className='qt ur';
    document.getElementById('qur').style.display='none';
  } else {
    qenEl.className='qt';
    const urEl=document.getElementById('qur');
    if(q.q_ur && q.q_ur!==q.q_en){urEl.textContent=q.q_ur;urEl.style.display='block';}
    else urEl.style.display='none';
  }

  // Options — rendered in HTML only, NEVER touches image code
  const grid=document.getElementById('agrid');
  grid.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='abtn'; btn.dataset.i=i;
    const isU=/[\u0600-\u06FF]/.test(opt);
    btn.innerHTML=`<span class="albl">${LBL[i]}</span><span class="atxt${isU?' ur':''}">${opt}</span>`;
    btn.onclick=()=>pick(i);
    grid.appendChild(btn);
  });

  document.getElementById('fb').className='fb';
  document.getElementById('btn-n').classList.remove('show');
}

function pick(idx){
  if(G.done)return; G.done=true;
  const q=G.qs[G.cur];
  const right=idx===q.ans;

  // Determine pic vs text question (pic = has drawn image, txt = text display)
  const isPic = !['num_23','num_435','num_867','desc_45_39','article_egg','article_house','article_umbrella','compare_numbers','subtract_calc','add_calc','storybooks_sent','question_sent'].includes(q.img);
  if(right){G.score++;if(isPic)G.picS++;else G.txtS++;}
  if(isPic)G.picT++;else G.txtT++;

  G.log.push({
    q: (q.q_en.replace(/[\u0600-\u06FF]/g,'').trim()||q.id).slice(0,55),
    chosen:q.opts[idx], correct:q.opts[q.ans], right
  });

  document.querySelectorAll('.abtn').forEach(b=>{
    const i=parseInt(b.dataset.i);
    if(i===q.ans) b.classList.add('cor');
    else if(i===idx&&!right) b.classList.add('wrg');
  });

  document.getElementById('fbi').textContent=right?'🌟':'❌';
  document.getElementById('fbm').textContent=right?'Correct! — درست جواب':'Wrong! — غلط جواب';
  document.getElementById('fbs').textContent=right?'Well done! شاباش!':'Correct: '+q.opts[q.ans];
  document.getElementById('fb').className=`fb show ${right?'cfb':'wfb'}`;

  const nb=document.getElementById('btn-n');
  nb.textContent=G.cur>=G.qs.length-1?'🎓 See Results':'Next Question →';
  nb.classList.add('show');
}

function nextQ(){
  G.cur++;
  G.cur<G.qs.length ? renderQ(G.cur) : showResults();
}

function showResults(){
  const tot=G.qs.length, pct=Math.round((G.score/tot)*100), pass=pct>=70;
  document.getElementById('res-nm').textContent=G.name;
  document.getElementById('res-info').textContent=`${G.subj} • Level 3 • ${tot} Questions`;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rfrac').textContent=`${G.score}/${tot}`;
  document.getElementById('sring').style.setProperty('--pct',pct+'%');
  const rb=document.getElementById('rbadge');
  rb.textContent=pass?'✅ PASSED — کامیاب 🌟':'📚 Keep Trying — مزید محنت کریں';
  rb.className=`rbadge ${pass?'pass':'fail'}`;

  // Breakdown
  const picPct=G.picT?Math.round((G.picS/G.picT)*100):0;
  const txtPct=G.txtT?Math.round((G.txtS/G.txtT)*100):0;
  document.getElementById('breakdown').innerHTML=`
    <div class="bk-card" style="background:#E8F8EE;border-color:#C8E8D0">
      <div style="font-size:18px">🖼️</div>
      <div style="font-size:13px;font-weight:700;color:var(--g)">Picture Qs</div>
      <div style="font-size:22px;font-weight:900;color:var(--g)">${G.picS}/${G.picT}</div>
      <div style="font-size:12px;color:#4A7A4A">${picPct}%</div>
    </div>
    <div class="bk-card" style="background:#EAF4FF;border-color:#AED6F1">
      <div style="font-size:18px">📝</div>
      <div style="font-size:13px;font-weight:700;color:#1A5276">Text Qs</div>
      <div style="font-size:22px;font-weight:900;color:#1A5276">${G.txtS}/${G.txtT}</div>
      <div style="font-size:12px;color:#4A7A4A">${txtPct}%</div>
    </div>`;

  // Teacher answer sheet
  const rows=document.getElementById('tv-rows');
  rows.innerHTML='';
  G.log.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className=`tv-row ${l.right?'cor':'wrg'}`;
    d.innerHTML=`<span style="font-size:15px;margin-right:3px">${l.right?'✅':'❌'}</span>
      <div class="tv-q">Q${i+1}: ${l.q}…</div>
      <div class="tv-a">
        <div style="color:#2980B9">→ ${l.chosen}</div>
        <div style="color:${l.right?'#01411C':'#C0392B'}">✓ ${l.correct}</div>
      </div>`;
    rows.appendChild(d);
  });

  document.getElementById('strip').style.display='none';
  show('sc-res');
}

function resetAll(){
  Object.assign(G,{pin:'',name:'',subj:'Math',qs:[],cur:0,score:0,picS:0,txtS:0,picT:0,txtT:0,done:false,log:[]});
  document.getElementById('pin-in').value='';
  document.getElementById('name-in').value='';
  document.getElementById('err').classList.remove('show');
  document.getElementById('strip').style.display='none';
  document.getElementById('tv-wrap').classList.remove('show');
  document.querySelectorAll('.sbtn').forEach((b,i)=>b.classList.toggle('sel',i===0));
  show('sc-login');
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(document.getElementById('sc-q').classList.contains('active')){
    const m={a:0,b:1,c:2,d:3,A:0,B:1,C:2,D:3};
    if(m[e.key]!==undefined) pick(m[e.key]);
    if((e.key==='Enter'||e.key===' ')&&document.getElementById('btn-n').classList.contains('show')) nextQ();
  }
  if(document.getElementById('sc-login').classList.contains('active')&&e.key==='Enter') start();
});
</script>
</body>
</html>
