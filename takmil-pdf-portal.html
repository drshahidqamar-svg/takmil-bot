<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TAKMIL — Level 1 Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#01411C; --green-mid:#026B2F; --green-lite:#04A344;
  --gold:#F5C842; --white:#FFFFFF; --text:#1A2E1A;
  --radius:24px; --shadow:0 8px 40px rgba(1,65,28,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Baloo 2',cursive;background:linear-gradient(145deg,#E8F8F5,#F0FFF8,#FFF8E8);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 10% 20%,rgba(4,163,68,0.08) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(245,200,66,0.08) 0%,transparent 40%)}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:680px;z-index:1;position:relative}
.screen.active{display:flex;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.card{background:white;border-radius:32px;padding:32px 28px;width:100%;box-shadow:var(--shadow);border:2px solid rgba(4,163,68,0.1)}
.logo-wrap{text-align:center;margin-bottom:24px}
.logo-icon{width:76px;height:76px;background:linear-gradient(135deg,var(--green),var(--green-lite));border-radius:22px;display:inline-flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:10px;box-shadow:0 8px 28px rgba(1,65,28,0.3);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-title{font-size:34px;font-weight:800;color:var(--green);letter-spacing:-1px}
.logo-sub{font-size:13px;color:#4A7A4A;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.logo-urdu{font-family:'Noto Nastaliq Urdu',serif;font-size:18px;color:var(--green-mid);direction:rtl;margin-top:6px}
.field-label{font-size:13px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;display:block}
input{width:100%;padding:16px 18px;font-size:18px;font-family:'Baloo 2',cursive;font-weight:700;border:3px solid #C8E8D0;border-radius:16px;outline:none;color:var(--text);background:#F5FFF8;transition:all 0.2s}
input:focus{border-color:var(--green-lite);box-shadow:0 0 0 4px rgba(4,163,68,0.15);background:white}
input::placeholder{color:#AADABC;font-weight:400}
.field-group{margin-bottom:16px}
.subject-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.subj-btn{padding:16px 8px;border:3px solid #C8E8D0;border-radius:18px;background:#F5FFF8;cursor:pointer;text-align:center;transition:all 0.15s;font-family:'Baloo 2',cursive}
.subj-btn .si{font-size:26px;display:block;margin-bottom:4px}
.subj-btn .sn{font-size:13px;font-weight:700;color:var(--green)}
.subj-btn.selected{border-color:var(--green);background:#E8F8EE;transform:scale(1.04)}
.btn-primary{width:100%;padding:18px;background:linear-gradient(135deg,var(--green),var(--green-mid));color:white;font-size:19px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:18px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,0.35);transition:transform 0.15s;margin-top:6px}
.btn-primary:active{transform:scale(0.97)}
.err{background:#FEE8E7;border:2px solid #F5C6C3;color:#C0392B;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:700;margin-top:10px;display:none;text-align:center}
.err.show{display:block;animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.progress-wrap{width:100%;margin-bottom:18px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-lbl{font-size:12px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1px}
.prog-cnt{font-size:20px;font-weight:800;color:var(--green)}
.prog-bar{height:10px;background:#C8E8D0;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green-lite),var(--gold));border-radius:10px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.student-strip{width:100%;max-width:680px;background:var(--green);border-radius:16px;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;z-index:1;box-shadow:0 4px 16px rgba(1,65,28,0.2)}
.sn-name{font-size:15px;font-weight:800;color:white;display:flex;align-items:center;gap:6px}
.sn-sub{font-size:12px;color:rgba(255,255,255,0.75);font-weight:600}
.image-box{width:100%;background:linear-gradient(135deg,#F0FFF8,#E8F8EE);border:3px solid #C8E8D0;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;min-height:180px;padding:14px;overflow:hidden}
.image-box svg{max-width:100%;max-height:240px}
.q-text{font-size:20px;font-weight:700;color:var(--text);text-align:center;margin-bottom:8px;line-height:1.4}
.q-urdu{font-family:'Noto Nastaliq Urdu',serif;font-size:18px;color:#2E6B3E;direction:rtl;text-align:right;margin-bottom:16px;background:#F5FFF8;padding:10px 14px;border-radius:12px;border-right:4px solid var(--green-lite);line-height:2}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.answers-grid.cols1{grid-template-columns:1fr}
.answers-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.ans-btn{padding:16px 12px;border:3px solid #C8E8D0;border-radius:18px;background:white;cursor:pointer;transition:all 0.15s;text-align:center;box-shadow:0 4px 12px rgba(1,65,28,0.08)}
.ans-btn:active{transform:scale(0.95)}
.ans-lbl{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:#E8F8EE;border-radius:8px;font-size:16px;font-weight:900;color:var(--green);margin-bottom:6px;transition:all 0.15s}
.ans-text{font-size:15px;font-weight:700;color:var(--text);display:block;line-height:1.3}
.ans-svg{display:block;margin:0 auto 6px}
.ans-urdu{font-family:'Noto Nastaliq Urdu',serif;font-size:15px;color:#4A7A4A;direction:rtl;display:block;margin-top:3px}
.ans-btn.selected,.ans-btn:hover{border-color:var(--green);background:linear-gradient(135deg,#F0F8F2,#E8F5EC)}
.ans-btn.selected .ans-lbl{background:var(--green);color:white}
.ans-btn.correct{border-color:var(--green-lite);background:linear-gradient(135deg,#E8F8EE,#D4F0DE)}
.ans-btn.correct .ans-lbl{background:var(--green-lite);color:white}
.ans-btn.wrong{border-color:#E74C3C;background:#FEF0EF}
.ans-btn.wrong .ans-lbl{background:#E74C3C;color:white}
.feedback{padding:12px 18px;border-radius:14px;font-size:17px;font-weight:700;text-align:center;margin-bottom:14px;display:none}
.feedback.cfb{background:#E8F8EE;color:var(--green);border:2px solid var(--green-lite);display:block}
.feedback.wfb{background:#FEF0EF;color:#C0392B;border:2px solid #F5A89F;display:block}
.btn-next{width:100%;padding:17px;background:linear-gradient(135deg,var(--green),var(--green-mid));color:white;font-size:17px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:18px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,0.3);display:none;transition:transform 0.15s}
.btn-next:active{transform:scale(0.97)}
.btn-next.show{display:block;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.score-wrap{text-align:center;margin:10px 0 22px}
.score-ring{width:150px;height:150px;border-radius:50%;background:conic-gradient(var(--green-lite) 0%,var(--green-lite) var(--pct),#C8E8D0 var(--pct));display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(1,65,28,0.2);position:relative}
.score-ring::before{content:'';position:absolute;width:112px;height:112px;background:white;border-radius:50%}
.score-inner{position:relative;z-index:1}
.score-pct{font-size:34px;font-weight:900;color:var(--green)}
.score-lbl{font-size:11px;font-weight:700;color:#4A7A4A;letter-spacing:1px}
.res-badge{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border-radius:50px;font-size:17px;font-weight:800;margin-bottom:18px}
.res-badge.passed{background:#E8F8EE;color:var(--green);border:2px solid var(--green-lite)}
.res-badge.failed{background:#FEF0EF;color:#C0392B;border:2px solid #F5A89F}
.done-card{background:linear-gradient(135deg,#F0F8F2,#E8F5EC);border-radius:16px;border:2px solid #C8E8D0;padding:18px;text-align:center}
.done-card .di{font-size:36px;margin-bottom:6px}
.done-card .dm{font-size:16px;font-weight:700;color:var(--green)}
.done-card .du{font-family:'Noto Nastaliq Urdu',serif;font-size:14px;color:#4A7A4A;direction:rtl;margin-top:5px}
.spinner{width:52px;height:52px;border:5px solid #C8E8D0;border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.card{padding:22px 16px}.q-text{font-size:17px}.ans-text{font-size:13px}.answers-grid{gap:8px}}
</style>
</head>
<body>

<!-- SCREEN 1: SETUP -->
<div class="screen active" id="sc-setup">
  <div class="logo-wrap">
    <div class="logo-icon">📚</div>
    <div class="logo-title">TAKMIL</div>
    <div class="logo-sub">Level 1 Assessment</div>
    <div class="logo-urdu">سطح ۱ — امتحان</div>
  </div>
  <div class="card">
    <div class="field-group">
      <label class="field-label">PIN</label>
      <input type="password" id="pin-in" placeholder="Enter PIN" maxlength="10" autocomplete="off">
    </div>
    <div class="field-group">
      <label class="field-label">Student Name — نام طالب علم</label>
      <input type="text" id="name-in" placeholder="Full name" style="letter-spacing:0">
    </div>
    <div class="field-group">
      <label class="field-label">Subject — مضمون</label>
      <div class="subject-grid">
        <button class="subj-btn selected" onclick="selSubj('Math',this)"><span class="si">🔢</span><span class="sn">Math</span></button>
        <button class="subj-btn" onclick="selSubj('English',this)"><span class="si">🔤</span><span class="sn">English</span></button>
        <button class="subj-btn" onclick="selSubj('Urdu',this)"><span class="si" style="font-family:'Noto Nastaliq Urdu',serif;font-size:20px">اردو</span><span class="sn">Urdu</span></button>
      </div>
    </div>
    <button class="btn-primary" onclick="startAssessment()">شروع کریں • Start ▶</button>
    <div class="err" id="err">Please enter a valid PIN and student name.</div>
  </div>
</div>

<!-- SCREEN 2: LOADING -->
<div class="screen" id="sc-loading">
  <div class="card" style="text-align:center">
    <div class="spinner"></div>
    <div style="font-size:17px;font-weight:700;color:#4A7A4A">Loading questions…</div>
  </div>
</div>

<!-- SCREEN 3: QUESTION -->
<div class="student-strip" id="stu-strip" style="display:none">
  <div class="sn-name">👤 <span id="strip-name"></span></div>
  <div class="sn-sub" id="strip-sub"></div>
</div>
<div class="screen" id="sc-question">
  <div class="card">
    <div class="progress-wrap">
      <div class="prog-top">
        <span class="prog-lbl">Question</span>
        <span class="prog-cnt"><span id="qn">1</span>/<span id="qt">10</span></span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
    </div>
    <div class="image-box" id="img-box"></div>
    <div class="q-text" id="q-en"></div>
    <div class="q-urdu" id="q-ur" style="display:none"></div>
    <div class="answers-grid" id="ans-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextQ()">Next →</button>
  </div>
</div>

<!-- SCREEN 4: RESULTS -->
<div class="screen" id="sc-results">
  <div class="card">
    <div class="logo-wrap" style="margin-bottom:14px">
      <div class="logo-icon" style="width:64px;height:64px;font-size:30px;animation:none">🏆</div>
      <div class="logo-title" style="font-size:22px">Assessment Complete!</div>
      <div class="logo-urdu" style="font-size:16px">امتحان مکمل ہوگیا!</div>
    </div>
    <div style="text-align:center;font-size:15px;font-weight:700;color:#4A7A4A;margin-bottom:8px"><span id="r-name"></span></div>
    <div class="score-wrap">
      <div class="score-ring" id="s-ring" style="--pct:0%">
        <div class="score-inner">
          <div class="score-pct" id="r-pct">0%</div>
          <div class="score-lbl" id="r-frac">0/0</div>
        </div>
      </div>
    </div>
    <div class="res-badge" id="r-badge">✅ PASSED</div>
    <div class="done-card">
      <div class="di">👩‍🏫</div>
      <div class="dm">Please give the tablet to your teacher</div>
      <div class="du">براہ کرم ٹیبلیٹ استاد کو دیں</div>
    </div>
    <button class="btn-primary" onclick="reset()" style="margin-top:14px;background:linear-gradient(135deg,#4A6B4A,#2E4E2E)">New Student — نیا طالب علم</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SVG LIBRARY — all based on actual PDF content
// ═══════════════════════════════════════════════════════════════
const S = {

  // ── VOWEL IDENTIFICATION ─────────────────────────────────────
  vowel_hot:`<svg viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg">

  vowel_fish:`<svg viewBox="0 0 220 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="220" height="100" rx="16" fill="#EBF5FB"/>

// SESSION
// ═══════════════════════════════════════════════════════════════
let sess={subject:'Math',name:'',qs:[],cur:0,score:0,done:false};

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function selSubj(s,el){sess.subject=s;document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected')}

async function startAssessment(){
  const pin=document.getElementById('pin-in').value.trim();
  const name=document.getElementById('name-in').value.trim();
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(!pin||pin.length<4){err.textContent='Please enter a valid PIN.';err.classList.add('show');return}
  if(!name||name.length<2){err.textContent='Please enter the student name.';err.classList.add('show');return}
  show('sc-loading');
  sess.name=name; sess.cur=0; sess.score=0; sess.done=false;
  const bank=[...(QB[sess.subject]||QB.Math)];
  for(let i=bank.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bank[i],bank[j]]=[bank[j],bank[i]]}
  sess.qs=bank.slice(0,Math.min(10,bank.length));
  try{await fetch('/portal/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin,studentName:name})})}catch(e){}
  document.getElementById('strip-name').textContent=name;
  document.getElementById('strip-sub').textContent=`${sess.subject} • Level 1 Assessment`;
  document.getElementById('stu-strip').style.display='flex';
  renderQ(0);show('sc-question');
}

function renderQ(idx){
  sess.done=false;
  const q=sess.qs[idx],total=sess.qs.length;
  document.getElementById('qn').textContent=idx+1;
  document.getElementById('qt').textContent=total;
  document.getElementById('pf').style.width=`${(idx/total)*100}%`;
  const ib=document.getElementById('img-box');
  ib.innerHTML=S[q.img]||`<div style="font-size:60px;text-align:center">📖</div>`;
  document.getElementById('q-en').textContent=q.q;
  const ur=document.getElementById('q-ur');
  if(q.qur){ur.textContent=q.qur;ur.style.display='block'}else ur.style.display='none';
  const grid=document.getElementById('ans-grid');
  grid.innerHTML='';
  grid.className=`answers-grid${q.opts.length===3?' cols3':''}`;
  const labels=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';btn.dataset.i=i;
    const isUrdu=/[\u0600-\u06FF]/.test(opt);
    btn.innerHTML=`<span class="ans-lbl">${labels[i]}</span><span class="ans-text${isUrdu?' ans-urdu':''}">${opt}</span>`;
    btn.onclick=()=>pick(i);
    grid.appendChild(btn);
  });
  document.getElementById('feedback').className='feedback';
  document.getElementById('btn-next').classList.remove('show');
}

function pick(idx){
  if(sess.done)return;
  sess.done=true;
  const q=sess.qs[sess.cur];
  const right=idx===q.ans;
  if(right)sess.score++;
  document.querySelectorAll('.ans-btn').forEach(b=>{
    const i=parseInt(b.dataset.i);
    if(i===q.ans)b.classList.add('correct');
    else if(i===idx&&!right)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  fb.textContent=right?'✅ Correct! — درست جواب 🌟':'❌ Wrong! — غلط جواب';
  fb.className=`feedback ${right?'cfb':'wfb'}`;
  const nb=document.getElementById('btn-next');
  nb.textContent=sess.cur>=sess.qs.length-1?'🎓 See Results':'Next Question →';
  nb.classList.add('show');
}

function nextQ(){
  sess.cur++;
  if(sess.cur<sess.qs.length){renderQ(sess.cur);window.scrollTo(0,0)}
  else showResults();
}

function showResults(){
  const total=sess.qs.length,pct=Math.round((sess.score/total)*100),passed=pct>=70;
  document.getElementById('r-name').textContent=sess.name;
  document.getElementById('r-pct').textContent=pct+'%';
  document.getElementById('r-frac').textContent=`${sess.score}/${total}`;
  document.getElementById('s-ring').style.setProperty('--pct',pct+'%');
  const rb=document.getElementById('r-badge');
  rb.textContent=passed?'✅ PASSED — کامیاب 🌟':'📚 Keep Trying — مزید محنت کریں';
  rb.className=`res-badge ${passed?'passed':'failed'}`;
  document.getElementById('stu-strip').style.display='none';
  show('sc-results');
}

function reset(){
  sess={subject:'Math',name:'',qs:[],cur:0,score:0,done:false};
  document.getElementById('name-in').value='';
  document.getElementById('pin-in').value='';
  document.getElementById('err').classList.remove('show');
  document.getElementById('stu-strip').style.display='none';
  document.querySelectorAll('.subj-btn').forEach((b,i)=>b.classList.toggle('selected',i===0));
  show('sc-setup');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')startAssessment()});
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('sc-question').classList.contains('active'))return;
    const m={'a':0,'b':1,'c':2,'d':3,'A':0,'B':1,'C':2,'D':3};
    if(m[e.key]!==undefined)pick(m[e.key]);
    if(e.key==='Enter'){const nb=document.getElementById('btn-next');if(nb.classList.contains('show'))nextQ()}
  });
});
