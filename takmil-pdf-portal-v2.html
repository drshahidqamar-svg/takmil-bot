<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TAKMIL — Level 1 Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--g:#01411C;--gm:#026B2F;--gl:#04A344;--gold:#F5C842;--w:#FFF;--tx:#1A2E1A;--sh:0 8px 40px rgba(1,65,28,0.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Baloo 2',cursive;background:linear-gradient(145deg,#E8F8F5,#F5FFF8,#FFF8EC);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 10% 20%,rgba(4,163,68,0.07) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(245,200,66,0.07) 0%,transparent 40%)}
.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:680px;z-index:1;position:relative}
.screen.active{display:flex;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:none}}
.card{background:var(--w);border-radius:32px;padding:32px 28px;width:100%;box-shadow:var(--sh);border:2px solid rgba(4,163,68,.1)}

/* Setup */
.logo-wrap{text-align:center;margin-bottom:22px}
.logo-icon{width:74px;height:74px;background:linear-gradient(135deg,var(--g),var(--gl));border-radius:22px;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:10px;box-shadow:0 8px 28px rgba(1,65,28,.3);animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.logo-title{font-size:32px;font-weight:800;color:var(--g);letter-spacing:-1px}
.logo-sub{font-size:12px;color:#4A7A4A;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.logo-ur{font-family:'Noto Nastaliq Urdu',serif;font-size:17px;color:#026B2F;direction:rtl;margin-top:5px}
.fl{font-size:12px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;display:block}
input{width:100%;padding:15px 17px;font-size:17px;font-family:'Baloo 2',cursive;font-weight:700;border:3px solid #C8E8D0;border-radius:16px;outline:none;color:var(--tx);background:#F5FFF8;transition:all .2s}
input:focus{border-color:var(--gl);box-shadow:0 0 0 4px rgba(4,163,68,.14);background:var(--w)}
input::placeholder{color:#AADABC;font-weight:400}
.fg{margin-bottom:15px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:16px}
.sbtn{padding:14px 7px;border:3px solid #C8E8D0;border-radius:16px;background:#F5FFF8;cursor:pointer;text-align:center;transition:all .15s;font-family:'Baloo 2',cursive}
.sbtn .si{font-size:24px;display:block;margin-bottom:3px}
.sbtn .sn{font-size:12px;font-weight:700;color:var(--g)}
.sbtn.sel{border-color:var(--g);background:#E8F8EE;transform:scale(1.04)}
.btn-p{width:100%;padding:17px;background:linear-gradient(135deg,var(--g),var(--gm));color:var(--w);font-size:18px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:17px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,.35);transition:transform .15s;margin-top:5px}
.btn-p:active{transform:scale(.97)}
.err-msg{background:#FEE8E7;border:2px solid #F5C6C3;color:#C0392B;border-radius:12px;padding:11px 15px;font-size:14px;font-weight:700;margin-top:10px;display:none;text-align:center}
.err-msg.show{display:block;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* Progress */
.pw{width:100%;margin-bottom:16px}
.pt{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pl{font-size:11px;font-weight:700;color:#4A7A4A;text-transform:uppercase;letter-spacing:1px}
.pc{font-size:20px;font-weight:800;color:var(--g)}
.pb{height:10px;background:#C8E8D0;border-radius:10px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--gl),var(--gold));border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Strip */
.strip{width:100%;max-width:680px;background:var(--g);border-radius:16px;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;z-index:1;box-shadow:0 4px 16px rgba(1,65,28,.2)}
.sn{font-size:15px;font-weight:800;color:var(--w);display:flex;align-items:center;gap:6px}
.ss{font-size:12px;color:rgba(255,255,255,.75);font-weight:600}

/* Question */
.ibox{width:100%;background:linear-gradient(135deg,#F0FFF8,#E8F8EE);border:3px solid #C8E8D0;border-radius:22px;display:flex;align-items:center;justify-content:center;margin-bottom:15px;min-height:170px;padding:12px;overflow:hidden}
.ibox svg{max-width:100%;max-height:230px}
.qt{font-size:19px;font-weight:700;color:var(--tx);text-align:center;margin-bottom:7px;line-height:1.4}
.qur{font-family:'Noto Nastaliq Urdu',serif;font-size:17px;color:#2E6B3E;direction:rtl;text-align:right;margin-bottom:14px;background:#F5FFF8;padding:10px 13px;border-radius:12px;border-right:4px solid var(--gl);line-height:2}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.agrid.c3{grid-template-columns:1fr 1fr 1fr}
.agrid.c1{grid-template-columns:1fr}
.abtn{padding:16px 12px;border:3px solid #C8E8D0;border-radius:18px;background:var(--w);cursor:pointer;transition:all .15s;text-align:center;box-shadow:0 3px 10px rgba(1,65,28,.08);position:relative}
.abtn:active{transform:scale(.95)}
.albl{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:#E8F8EE;border-radius:8px;font-size:15px;font-weight:900;color:var(--g);margin-bottom:5px;transition:all .15s}
.atxt{font-size:15px;font-weight:700;color:var(--tx);display:block;line-height:1.3}
.aur{font-family:'Noto Nastaliq Urdu',serif;font-size:14px;color:#4A7A4A;direction:rtl;display:block;margin-top:2px}
.abtn.sel,.abtn:hover{border-color:var(--g);background:linear-gradient(135deg,#F0F8F2,#E8F5EC)}
.abtn.sel .albl{background:var(--g);color:var(--w)}
.abtn.cor{border-color:var(--gl);background:linear-gradient(135deg,#E8F8EE,#D4F0DE);animation:bounce .4s}
.abtn.cor .albl{background:var(--gl);color:var(--w)}
.abtn.wrg{border-color:#E74C3C;background:#FEF0EF;animation:wobble .4s}
.abtn.wrg .albl{background:#E74C3C;color:var(--w)}
@keyframes bounce{0%,100%{transform:scale(1)}40%{transform:scale(1.06)}}
@keyframes wobble{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}

/* Feedback — BIGGER & CLEARER */
.fb{padding:16px 20px;border-radius:16px;font-size:0;text-align:center;margin-bottom:14px;display:none;transition:all .3s}
.fb .fb-icon{font-size:32px;display:block;margin-bottom:6px}
.fb .fb-main{font-size:20px;font-weight:800;display:block;margin-bottom:4px}
.fb .fb-cor{font-size:14px;font-weight:600;display:block;color:inherit;opacity:.8}
.fb.cfb{background:#E8F8EE;color:var(--g);border:3px solid var(--gl);display:block}
.fb.wfb{background:#FEF0EF;color:#C0392B;border:3px solid #F5A89F;display:block}

.btn-n{width:100%;padding:17px;background:linear-gradient(135deg,var(--g),var(--gm));color:var(--w);font-size:17px;font-weight:800;font-family:'Baloo 2',cursive;border:none;border-radius:18px;cursor:pointer;box-shadow:0 6px 24px rgba(1,65,28,.3);display:none;transition:transform .15s}
.btn-n:active{transform:scale(.97)}
.btn-n.show{display:block;animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}

/* Results */
.sring{width:150px;height:150px;border-radius:50%;background:conic-gradient(var(--gl) 0%,var(--gl) var(--pct),#C8E8D0 var(--pct));display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(1,65,28,.2);position:relative}
.sring::before{content:'';position:absolute;width:112px;height:112px;background:var(--w);border-radius:50%}
.sinner{position:relative;z-index:1}
.spct{font-size:34px;font-weight:900;color:var(--g)}
.slbl{font-size:11px;font-weight:700;color:#4A7A4A;letter-spacing:1px}
.rbadge{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;border-radius:50px;font-size:17px;font-weight:800;margin-bottom:16px}
.rbadge.pass{background:#E8F8EE;color:var(--g);border:2px solid var(--gl)}
.rbadge.fail{background:#FEF0EF;color:#C0392B;border:2px solid #F5A89F}
.done-c{background:linear-gradient(135deg,#F0F8F2,#E8F5EC);border-radius:16px;border:2px solid #C8E8D0;padding:16px;text-align:center;margin-bottom:14px}
.done-c .di{font-size:34px;margin-bottom:5px}
.done-c .dm{font-size:15px;font-weight:700;color:var(--g)}
.done-c .du{font-family:'Noto Nastaliq Urdu',serif;font-size:13px;color:#4A7A4A;direction:rtl;margin-top:4px}

/* Teacher View */
.tv-btn{width:100%;padding:14px;background:linear-gradient(135deg,#2C3E50,#1A252F);color:var(--w);font-size:15px;font-weight:700;font-family:'Baloo 2',cursive;border:none;border-radius:14px;cursor:pointer;margin-top:8px}
.tv-wrap{display:none;margin-top:16px;width:100%}
.tv-wrap.show{display:block;animation:popIn .3s}
.tv-title{font-size:16px;font-weight:800;color:var(--g);margin-bottom:12px;text-align:center;padding:10px;background:#E8F8EE;border-radius:12px;border:2px solid var(--gl)}
.tv-row{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:12px;margin-bottom:8px;border:2px solid}
.tv-row.cor{background:#F0FFF8;border-color:#C8E8D0}
.tv-row.wrg{background:#FEF5F5;border-color:#F5C6C3}
.tv-q{flex:1;font-size:12px;color:#333;font-weight:600;line-height:1.4}
.tv-ans{text-align:right;font-size:12px;font-weight:700}
.tv-ans .stu{color:#2980B9}
.tv-ans .ok{color:var(--g)}
.tv-ans .bad{color:#E74C3C}
.tv-mark{font-size:18px;margin-right:4px}

.spin{width:50px;height:50px;border:5px solid #C8E8D0;border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin:38px auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.card{padding:20px 15px}.qt{font-size:16px}.atxt{font-size:13px}.agrid{gap:8px}}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen active" id="sc-setup">
  <div class="logo-wrap">
    <div class="logo-icon">📚</div>
    <div class="logo-title">TAKMIL</div>
    <div class="logo-sub">Level 1 — Picture Assessment</div>
    <div class="logo-ur">سطح ۱ — تصویری امتحان</div>
  </div>
  <div class="card">
    <div class="fg"><label class="fl">PIN</label>
      <input type="password" id="pin-in" placeholder="Enter PIN" maxlength="10" autocomplete="off"></div>
    <div class="fg"><label class="fl">Student Name — نام طالب علم</label>
      <input type="text" id="name-in" placeholder="Full name" style="letter-spacing:0"></div>
    <div class="fg"><label class="fl">Subject — مضمون</label>
      <div class="sgrid">
        <button class="sbtn sel" onclick="selS('Math',this)"><span class="si">🔢</span><span class="sn">Math<br>ریاضی</span></button>
        <button class="sbtn" onclick="selS('English',this)"><span class="si">🔤</span><span class="sn">English<br>انگریزی</span></button>
        <button class="sbtn" onclick="selS('Urdu',this)"><span class="si" style="font-family:'Noto Nastaliq Urdu',serif;font-size:18px">اردو</span><span class="sn">Urdu<br>اردو</span></button>
      </div>
    </div>
    <button class="btn-p" onclick="start()">شروع کریں &nbsp;•&nbsp; Start ▶</button>
    <div class="err-msg" id="err">Please enter a valid PIN and student name.</div>
  </div>
</div>

<!-- LOADING -->
<div class="screen" id="sc-load">
  <div class="card" style="text-align:center">
    <div class="spin"></div>
    <div style="font-size:16px;font-weight:700;color:#4A7A4A">Loading questions…</div>
  </div>
</div>

<!-- STRIP -->
<div class="strip" id="strip" style="display:none">
  <div class="sn">👤 <span id="sn-txt"></span></div>
  <div class="ss" id="ss-txt"></div>
</div>

<!-- QUESTION -->
<div class="screen" id="sc-q">
  <div class="card">
    <div class="pw">
      <div class="pt"><span class="pl">Question</span><span class="pc"><span id="qn">1</span>/<span id="qt">10</span></span></div>
      <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    </div>
    <div class="ibox" id="ibox"></div>
    <div class="qt" id="qen"></div>
    <div class="qur" id="qur" style="display:none"></div>
    <div class="agrid" id="agrid"></div>
    <div class="fb" id="fb">
      <span class="fb-icon" id="fb-icon"></span>
      <span class="fb-main" id="fb-main"></span>
      <span class="fb-cor" id="fb-cor"></span>
    </div>
    <button class="btn-n" id="btn-n" onclick="nextQ()">Next Question →</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="sc-res">
  <div class="card">
    <div class="logo-wrap" style="margin-bottom:12px">
      <div class="logo-icon" style="width:62px;height:62px;font-size:28px;animation:none">🏆</div>
      <div class="logo-title" style="font-size:21px">Assessment Complete!</div>
      <div class="logo-ur" style="font-size:15px">امتحان مکمل ہوگیا!</div>
    </div>
    <div style="text-align:center;font-size:14px;font-weight:700;color:#4A7A4A;margin-bottom:8px" id="rname"></div>
    <div style="text-align:center;margin:10px 0 18px">
      <div class="sring" id="sring" style="--pct:0%">
        <div class="sinner"><div class="spct" id="rpct">0%</div><div class="slbl" id="rfrac">0/0</div></div>
      </div>
    </div>
    <div class="rbadge" id="rbadge">✅ PASSED</div>
    <div class="done-c">
      <div class="di">👩‍🏫</div>
      <div class="dm">Please give the tablet to your teacher</div>
      <div class="du">براہ کرم ٹیبلیٹ استاد کو دیں</div>
    </div>

    <!-- Teacher View -->
    <button class="tv-btn" onclick="toggleTV()">👩‍🏫 Teacher Summary — استاد کا خلاصہ</button>
    <div class="tv-wrap" id="tv-wrap">
      <div class="tv-title">📋 Answer Sheet — جوابی ورق</div>
      <div id="tv-rows"></div>
    </div>

    <button class="btn-p" onclick="reset()" style="margin-top:12px;background:linear-gradient(135deg,#4A6B4A,#2E4E2E)">New Student — نیا طالب علم</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// SVG LIBRARY — every image matched to its exact question
// ════════════════════════════════════════════════════════════
const S={

  /* ── MATH ── */

  // Q1: صفر = zero shape
  zero:`<svg viewBox="0 0 220 200" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="110" cy="95" rx="92" ry="82" fill="none" stroke="#27AE60" stroke-width="9"/>
    <ellipse cx="110" cy="95" rx="56" ry="48" fill="none" stroke="#27AE60" stroke-width="6"/>
    <text x="110" y="175" text-anchor="middle" font-size="28" font-weight="900" fill="#27AE60" font-family="Noto Nastaliq Urdu,serif">صفر = ۰</text>
  </svg>`,

  // Q2: two trees — one with fruit (left), one without (right)
  trees:`<svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Tree with fruit -->
    <rect x="52" y="150" width="18" height="45" rx="5" fill="#8B4513"/>
    <circle cx="61" cy="98" r="52" fill="#27AE60"/>
    <circle cx="61" cy="85" r="38" fill="#2ECC71"/>
    ${[[42,76],[60,66],[78,78],[48,98],[72,95]].map(([x,y])=>`<circle cx="${x}" cy="${y}" r="9" fill="#E74C3C"/>`).join('')}
    <text x="61" y="198" text-anchor="middle" font-size="12" fill="#27AE60" font-weight="700" font-family="Arial">With fruit ✓</text>
    <!-- Divider -->
    <line x1="140" y1="10" x2="140" y2="190" stroke="#C8E8D0" stroke-width="2" stroke-dasharray="5,5"/>
    <!-- Tree WITHOUT fruit -->
    <rect x="190" y="150" width="18" height="45" rx="5" fill="#8B4513"/>
    <circle cx="199" cy="98" r="52" fill="#95A5A6"/>
    <circle cx="199" cy="85" r="38" fill="#7F8C8D"/>
    <text x="199" y="198" text-anchor="middle" font-size="12" fill="#E74C3C" font-weight="700" font-family="Arial">No fruit ← ✓</text>
  </svg>`,

  // Q3: exactly 3 stars for counting
  stars3:`<svg viewBox="0 0 260 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="260" height="120" rx="18" fill="#FFFDE7"/>
    ${[55,130,205].map(x=>`<polygon points="${x},15 ${x+11},42 ${x+40},42 ${x+17},58 ${x+25},85 ${x},68 ${x-25},85 ${x-17},58 ${x-40},42 ${x-11},42" fill="#F5C842" stroke="#D4A017" stroke-width="2"/>`).join('')}
    <text x="130" y="110" text-anchor="middle" font-size="14" font-weight="900" fill="#D4A017" font-family="Arial">Count the stars!</text>
  </svg>`,

  // Q4: exactly 5 circles for counting
  circles5:`<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="120" rx="18" fill="#EBF5FB"/>
    ${[[32,'#E74C3C'],[88,'#3498DB'],[144,'#27AE60'],[200,'#F5C842'],[256,'#9B59B6']].map(([x,c])=>`<circle cx="${x}" cy="55" r="28" fill="${c}"/><circle cx="${x-8}" cy="${y=43}" r="8" fill="white" opacity="0.2"/>`).join('')}
    <text x="150" y="108" text-anchor="middle" font-size="14" font-weight="900" fill="#2980B9" font-family="Arial">Count the balls!</text>
  </svg>`,

  // Q5: number sequence 67-68-69-?-71 (what comes after 69)
  seq69:`<svg viewBox="0 0 340 120" xmlns="http://www.w3.org/2000/svg">
    <rect width="340" height="120" rx="18" fill="#F0F8FF"/>
    ${[['67',55,'#3498DB'],['68',115,'#27AE60'],['69',175,'#E67E22'],['?',235,'#E74C3C'],['71',295,'#9B59B6']].map(([n,x,c])=>`
      <rect x="${x-32}" y="20" width="64" height="55" rx="10" fill="${c}" opacity="${n==='?'?'.3':'.15'}" stroke="${c}" stroke-width="${n==='?'?'3':'2'}"/>
      <text x="${x}" y="52" text-anchor="middle" font-size="${n==='?'?'28':'22'}" font-weight="900" fill="${n==='?'?c:'#2C3E50'}" font-family="Arial">${n}</text>
    `).join('')}
    ${[[85,90],[145,90],[205,90]].map(([x])=>`<text x="${x}" y="55" text-anchor="middle" font-size="22" fill="#555" font-family="Arial">→</text>`).join('')}
    <text x="170" y="110" text-anchor="middle" font-size="13" fill="#555" font-family="Arial">What number fills the ? box?</text>
  </svg>`,

  // Q6: equal groups — match by count
  equal_groups:`<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
    <rect width="300" height="180" rx="18" fill="#FEF9E7"/>
    <!-- Left: 4 helicopters (as simple shapes) -->
    <text x="75" y="30" text-anchor="middle" font-size="13" fill="#555" font-weight="700" font-family="Arial">Group A</text>
    ${[[25,55],[65,55],[25,100],[65,100]].map(([x,y])=>`<ellipse cx="${x+20}" cy="${y}" rx="22" ry="12" fill="#3498DB" opacity=".7"/><ellipse cx="${x+20}" cy="${y+5}" rx="12" ry="8" fill="#2980B9"/>`).join('')}
    <!-- Right: 4 circles -->
    <text x="225" y="30" text-anchor="middle" font-size="13" fill="#555" font-weight="700" font-family="Arial">Group B</text>
    ${[[175,55],[215,55],[175,100],[215,100]].map(([x,y])=>`<circle cx="${x+15}" cy="${y}" r="18" fill="#E74C3C" opacity=".7"/>`).join('')}
    <text x="150" y="75" text-anchor="middle" font-size="22" fill="#27AE60" font-weight="900" font-family="Arial">=</text>
    <text x="150" y="155" text-anchor="middle" font-size="13" fill="#27AE60" font-weight="700" font-family="Arial">Both groups have 4 items!</text>
    <text x="150" y="172" text-anchor="middle" font-size="12" fill="#555" font-family="Noto Nastaliq Urdu,serif">ایک جیسی تعداد کی چیزیں</text>
  </svg>`,

  // Q7: descending order 45→43→41→39 (clear visual)
  desc_order:`<svg viewBox="0 0 340 140" xmlns="http://www.w3.org/2000/svg">
    <rect width="340" height="140" rx="18" fill="#F5F0FF"/>

let G={subj:'Math',name:'',qs:[],cur:0,score:0,done:false,log:[]};
const labels=['A','B','C','D'];

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function selS(s,el){G.subj=s;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel')}

async function start(){
  const pin=document.getElementById('pin-in').value.trim();
  const name=document.getElementById('name-in').value.trim();
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(pin.length<4){err.textContent='Please enter a valid PIN.';err.classList.add('show');return}
  if(name.length<2){err.textContent='Please enter the student name.';err.classList.add('show');return}
  show('sc-load');
  G.name=name;G.cur=0;G.score=0;G.done=false;G.log=[];
  const bank=[...(QB[G.subj]||QB.Math)];
  for(let i=bank.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bank[i],bank[j]]=[bank[j],bank[i]]}
  G.qs=bank.slice(0,Math.min(10,bank.length));
  try{await fetch('/portal/session/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin,studentName:name})})}catch(e){}
  document.getElementById('sn-txt').textContent=name;
  document.getElementById('ss-txt').textContent=`${G.subj} • Level 1`;
  document.getElementById('strip').style.display='flex';
  renderQ(0);show('sc-q');
}

function renderQ(idx){
  G.done=false;
  const q=G.qs[idx],tot=G.qs.length;
  document.getElementById('qn').textContent=idx+1;
  document.getElementById('qt').textContent=tot;
  document.getElementById('pf').style.width=`${(idx/tot)*100}%`;
  document.getElementById('ibox').innerHTML=S[q.img]||'<div style="font-size:50px;text-align:center">📖</div>';
  document.getElementById('qen').textContent=q.q;
  const ur=document.getElementById('qur');
  if(q.qur){ur.textContent=q.qur;ur.style.display='block'}else ur.style.display='none';
  const grid=document.getElementById('agrid');
  grid.innerHTML='';
  grid.className=`agrid${q.opts.length===3?' c3':''}`;
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='abtn';btn.dataset.i=i;
    const isUr=/[\u0600-\u06FF]/.test(opt);
    btn.innerHTML=`<span class="albl">${labels[i]}</span><span class="atxt${isUr?' aur':''}">${opt.replace(' ✓','')}</span>`;
    btn.onclick=()=>pick(i);
    grid.appendChild(btn);
  });
  const fb=document.getElementById('fb');
  fb.className='fb';
  document.getElementById('btn-n').classList.remove('show');
}

function pick(idx){
  if(G.done)return;G.done=true;
  const q=G.qs[G.cur];
  const right=idx===q.ans;
  if(right)G.score++;
  G.log.push({q:q.q,chosen:q.opts[idx].replace(' ✓',''),correct:q.opts[q.ans].replace(' ✓',''),right});
  document.querySelectorAll('.abtn').forEach(b=>{
    const i=parseInt(b.dataset.i);
    if(i===q.ans)b.classList.add('cor');
    else if(i===idx&&!right)b.classList.add('wrg');
  });
  const fb=document.getElementById('fb');
  const icon=document.getElementById('fb-icon');
  const main=document.getElementById('fb-main');
  const cor=document.getElementById('fb-cor');
  if(right){
    icon.textContent='🌟';
    main.textContent='Correct! — درست جواب';
    cor.textContent='Well done! شاباش!';
    fb.className='fb cfb';
  }else{
    icon.textContent='❌';
    main.textContent='Wrong! — غلط جواب';
    cor.textContent=`Correct answer: ${q.opts[q.ans].replace(' ✓','')}`;
    fb.className='fb wfb';
  }
  const nb=document.getElementById('btn-n');
  nb.textContent=G.cur>=G.qs.length-1?'🎓 See Results — نتیجہ دیکھیں':'Next Question →';
  nb.classList.add('show');
}

function nextQ(){
  G.cur++;
  if(G.cur<G.qs.length){renderQ(G.cur);window.scrollTo(0,0)}
  else showResults();
}

function showResults(){
  const tot=G.qs.length,pct=Math.round((G.score/tot)*100),pass=pct>=70;
  document.getElementById('rname').textContent=G.name;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rfrac').textContent=`${G.score}/${tot}`;
  document.getElementById('sring').style.setProperty('--pct',pct+'%');
  const rb=document.getElementById('rbadge');
  rb.textContent=pass?'✅ PASSED — کامیاب 🌟':'📚 Keep Trying — مزید محنت کریں';
  rb.className=`rbadge ${pass?'pass':'fail'}`;
  // Build teacher rows
  const rows=document.getElementById('tv-rows');
  rows.innerHTML='';
  G.log.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className=`tv-row ${l.right?'cor':'wrg'}`;
    d.innerHTML=`<span class="tv-mark">${l.right?'✅':'❌'}</span><div class="tv-q">Q${i+1}: ${l.q.slice(0,60)}${l.q.length>60?'…':''}</div><div class="tv-ans"><div class="stu">Student: ${l.chosen}</div><div class="${l.right?'ok':'bad'}">Answer: ${l.correct}</div></div>`;
    rows.appendChild(d);
  });
  document.getElementById('strip').style.display='none';
  show('sc-res');
}

function toggleTV(){
  const w=document.getElementById('tv-wrap');
  w.classList.toggle('show');
}

function reset(){
  G={subj:'Math',name:'',qs:[],cur:0,score:0,done:false,log:[]};
  document.getElementById('name-in').value='';
  document.getElementById('pin-in').value='';
  document.getElementById('err').classList.remove('show');
  document.getElementById('strip').style.display='none';
  document.getElementById('tv-wrap').classList.remove('show');
  document.querySelectorAll('.sbtn').forEach((b,i)=>b.classList.toggle('sel',i===0));
  show('sc-setup');
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')start()});
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('sc-q').classList.contains('active'))return;
    const m={a:0,b:1,c:2,d:3,A:0,B:1,C:2,D:3};
    if(m[e.key]!==undefined)pick(m[e.key]);
    if(e.key==='Enter'){const nb=document.getElementById('btn-n');if(nb.classList.contains('show'))nextQ()}
  });
});
</script>
</body>
