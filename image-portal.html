<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TAKMIL — Picture Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #01411C;
  --green-mid:  #026B2F;
  --green-lite: #04A344;
  --gold:       #F5C842;
  --gold-dark:  #D4A017;
  --sky:        #E8F8F5;
  --white:      #FFFFFF;
  --text:       #1A2E1A;
  --radius:     24px;
  --shadow:     0 8px 40px rgba(1,65,28,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Baloo 2', cursive;
  background: linear-gradient(145deg, #E8F8F5 0%, #F0FFF8 50%, #FFF8E8 100%);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(circle at 10% 20%, rgba(4,163,68,0.08) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(245,200,66,0.08) 0%, transparent 40%);
}

.screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 640px; z-index: 1; position: relative; }
.screen.active { display: flex; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from { opacity:0; transform:scale(0.92) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }

/* ── Card ── */
.card {
  background: white; border-radius: 32px; padding: 36px 32px;
  width: 100%; box-shadow: var(--shadow);
  border: 2px solid rgba(4,163,68,0.1);
}

/* ── Header ── */
.logo-wrap { text-align: center; margin-bottom: 28px; }
.logo-icon {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, var(--green), var(--green-lite));
  border-radius: 24px; display: inline-flex; align-items: center;
  justify-content: center; font-size: 40px; margin-bottom: 12px;
  box-shadow: 0 8px 28px rgba(1,65,28,0.3);
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.logo-title { font-size: 36px; font-weight: 800; color: var(--green); letter-spacing: -1px; }
.logo-sub { font-size: 15px; color: #4A7A4A; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
.logo-sub-urdu { font-family: 'Noto Nastaliq Urdu', serif; font-size: 18px; color: var(--green-mid); direction: rtl; margin-top: 6px; }

/* ── Inputs ── */
.field-label { font-size: 14px; font-weight: 700; color: #4A7A4A; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
input[type="text"], input[type="password"] {
  width: 100%; padding: 18px 20px; font-size: 20px; font-family: 'Baloo 2', cursive; font-weight: 700;
  border: 3px solid #C8E8D0; border-radius: 16px; outline: none; color: var(--text);
  background: #F5FFF8; transition: all 0.2s; letter-spacing: 3px;
}
input[type="text"] { letter-spacing: 0; }
input:focus { border-color: var(--green-lite); box-shadow: 0 0 0 4px rgba(4,163,68,0.15); background: white; }
input::placeholder { color: #AADABC; letter-spacing: 0; font-weight: 400; }
.field-group { margin-bottom: 18px; }

/* ── Subject selector ── */
.subject-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
.subj-btn {
  padding: 16px 8px; border: 3px solid #C8E8D0; border-radius: 18px;
  background: #F5FFF8; cursor: pointer; text-align: center; transition: all 0.15s;
  font-family: 'Baloo 2', cursive;
}
.subj-btn .subj-icon { font-size: 28px; display: block; margin-bottom: 4px; }
.subj-btn .subj-name { font-size: 13px; font-weight: 700; color: var(--green); }
.subj-btn.selected { border-color: var(--green); background: #E8F8EE; transform: scale(1.04); }
.subj-btn:active { transform: scale(0.96); }

/* ── Buttons ── */
.btn-primary {
  width: 100%; padding: 20px; background: linear-gradient(135deg, var(--green), var(--green-mid));
  color: white; font-size: 20px; font-weight: 800; font-family: 'Baloo 2', cursive;
  border: none; border-radius: 18px; cursor: pointer;
  box-shadow: 0 6px 24px rgba(1,65,28,0.35);
  transition: transform 0.15s, box-shadow 0.15s; margin-top: 8px;
}
.btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(1,65,28,0.2); }

.error-msg {
  background: #FEE8E7; border: 2px solid #F5C6C3; color: #C0392B;
  border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 700;
  margin-top: 12px; display: none; text-align: center;
}
.error-msg.show { display: block; animation: shake 0.4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

/* ── Progress ── */
.progress-wrap { width: 100%; margin-bottom: 20px; }
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.progress-label { font-size: 13px; font-weight: 700; color: #4A7A4A; text-transform: uppercase; letter-spacing: 1px; }
.progress-count { font-size: 22px; font-weight: 800; color: var(--green); }
.progress-bar { height: 12px; background: #C8E8D0; border-radius: 12px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-lite), var(--gold)); border-radius: 12px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

/* ── Student strip ── */
.student-strip {
  width: 100%; max-width: 640px; background: var(--green); border-radius: 18px;
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; z-index: 1; box-shadow: 0 4px 16px rgba(1,65,28,0.2);
}
.strip-name { font-size: 16px; font-weight: 800; color: white; display: flex; align-items: center; gap: 8px; }
.strip-sub { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 600; }

/* ── Image box ── */
.image-box {
  width: 100%; background: linear-gradient(135deg, #F0FFF8, #E8F8EE);
  border: 3px solid #C8E8D0; border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px; min-height: 200px; padding: 16px;
  position: relative; overflow: hidden;
}
.image-box svg { max-width: 100%; max-height: 220px; }

/* ── Question text ── */
.q-text { font-size: 22px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 20px; line-height: 1.4; }
.q-urdu { font-family: 'Noto Nastaliq Urdu', serif; font-size: 18px; color: #4A7A4A; direction: rtl; text-align: right; margin-bottom: 16px; background: #F5FFF8; padding: 10px 14px; border-radius: 12px; border-right: 4px solid var(--green-lite); }

/* ── Answer buttons ── */
.answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.ans-btn {
  padding: 18px 14px; border: 3px solid #C8E8D0; border-radius: 20px;
  background: white; cursor: pointer; transition: all 0.15s; text-align: center;
  box-shadow: 0 4px 12px rgba(1,65,28,0.08); position: relative;
}
.ans-btn:active { transform: scale(0.95); }
.ans-label {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; background: #E8F8EE; border-radius: 10px;
  font-size: 18px; font-weight: 900; color: var(--green); margin-bottom: 6px;
  transition: all 0.15s;
}
.ans-text { font-size: 17px; font-weight: 700; color: var(--text); display: block; line-height: 1.3; }
.ans-urdu { font-family: 'Noto Nastaliq Urdu', serif; font-size: 15px; color: #4A7A4A; direction: rtl; display: block; margin-top: 2px; }

.ans-btn.selected, .ans-btn:hover { border-color: var(--green); background: linear-gradient(135deg, #F0F8F2, #E8F5EC); }
.ans-btn.selected .ans-label { background: var(--green); color: white; }
.ans-btn.correct { border-color: var(--green-lite); background: linear-gradient(135deg, #E8F8EE, #D4F0DE); }
.ans-btn.correct .ans-label { background: var(--green-lite); color: white; }
.ans-btn.wrong { border-color: #E74C3C; background: #FEF0EF; }
.ans-btn.wrong .ans-label { background: #E74C3C; color: white; }

/* ── Feedback ── */
.feedback { padding: 14px 20px; border-radius: 14px; font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 16px; display: none; }
.feedback.correct-fb { background: #E8F8EE; color: var(--green); border: 2px solid var(--green-lite); display: block; }
.feedback.wrong-fb { background: #FEF0EF; color: #C0392B; border: 2px solid #F5A89F; display: block; }

/* ── Next btn ── */
.btn-next {
  width: 100%; padding: 18px; background: linear-gradient(135deg, var(--green), var(--green-mid));
  color: white; font-size: 18px; font-weight: 800; font-family: 'Baloo 2', cursive;
  border: none; border-radius: 18px; cursor: pointer;
  box-shadow: 0 6px 24px rgba(1,65,28,0.3); display: none; margin-top: 4px;
  transition: transform 0.15s;
}
.btn-next:active { transform: scale(0.97); }
.btn-next.show { display: block; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }

/* ── Score ring ── */
.score-wrap { text-align: center; margin: 12px 0 24px; }
.score-ring {
  width: 160px; height: 160px; border-radius: 50%;
  background: conic-gradient(var(--green-lite) 0%, var(--green-lite) var(--pct), #C8E8D0 var(--pct));
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(1,65,28,0.2); position: relative;
}
.score-ring::before { content:''; position:absolute; width:120px; height:120px; background:white; border-radius:50%; }
.score-inner { position: relative; z-index: 1; }
.score-pct { font-size: 36px; font-weight: 900; color: var(--green); }
.score-lbl { font-size: 12px; font-weight: 700; color: #4A7A4A; letter-spacing: 1px; }
.result-badge {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 28px; border-radius: 50px; font-size: 18px; font-weight: 800;
  margin: 0 auto 20px;
}
.result-badge.passed { background: #E8F8EE; color: var(--green); border: 2px solid var(--green-lite); }
.result-badge.failed { background: #FEF0EF; color: #C0392B; border: 2px solid #F5A89F; }
.done-card { background: linear-gradient(135deg, #F0F8F2, #E8F5EC); border-radius: 18px; border: 2px solid #C8E8D0; padding: 20px; text-align: center; }
.done-card .icon { font-size: 40px; margin-bottom: 8px; }
.done-card .msg { font-size: 17px; font-weight: 700; color: var(--green); }
.done-card .urdu { font-family: 'Noto Nastaliq Urdu', serif; font-size: 15px; color: #4A7A4A; direction: rtl; margin-top: 6px; }

.loading-wrap { text-align: center; padding: 40px; }
.spinner { width: 56px; height: 56px; border: 5px solid #C8E8D0; border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media(max-width:480px) { .card{padding:24px 18px;} .q-text{font-size:18px;} .ans-text{font-size:15px;} .answers-grid{gap:10px;} }
</style>
</head>
<body>

<!-- ══ SCREEN 1: Setup ══ -->
<div class="screen active" id="screen-setup">
  <div class="logo-wrap">
    <div class="logo-icon">🎨</div>
    <div class="logo-title">TAKMIL</div>
    <div class="logo-sub">Picture Assessment</div>
    <div class="logo-sub-urdu">تصویری امتحان</div>
  </div>
  <div class="card">
    <div class="field-group">
      <label class="field-label">Assessment PIN</label>
      <input type="password" id="pin-input" placeholder="Enter PIN" maxlength="10" autocomplete="off">
    </div>
    <div class="field-group">
      <label class="field-label">Student Name — طالب علم کا نام</label>
      <input type="text" id="name-input" placeholder="Full name" style="letter-spacing:0">
    </div>
    <div class="field-group">
      <label class="field-label">Subject — مضمون</label>
      <div class="subject-grid">
        <button class="subj-btn selected" onclick="selectSubject('Math',this)">
          <span class="subj-icon">🔢</span><span class="subj-name">Math</span>
        </button>
        <button class="subj-btn" onclick="selectSubject('English',this)">
          <span class="subj-icon">🔤</span><span class="subj-name">English</span>
        </button>
        <button class="subj-btn" onclick="selectSubject('Urdu',this)">
          <span class="subj-icon">اردو</span><span class="subj-name">Urdu</span>
        </button>
      </div>
    </div>
    <button class="btn-primary" onclick="startAssessment()">شروع کریں &nbsp;•&nbsp; Start ▶</button>
    <div class="error-msg" id="setup-error">Please enter a valid PIN and student name.</div>
  </div>
</div>

<!-- ══ SCREEN 2: Loading ══ -->
<div class="screen" id="screen-loading">
  <div class="card">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div style="font-size:18px;font-weight:700;color:#4A7A4A;">Loading pictures…</div>
    </div>
  </div>
</div>

<!-- ══ SCREEN 3: Question ══ -->
<div class="student-strip" id="student-strip" style="display:none">
  <div class="strip-name">👤 <span id="strip-name"></span></div>
  <div class="strip-sub" id="strip-sub"></div>
</div>

<div class="screen" id="screen-question">
  <div class="card">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label">Question</span>
        <span class="progress-count"><span id="q-num">1</span>/<span id="q-total">10</span></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="image-box" id="image-box"></div>
    <div class="q-text" id="q-text"></div>
    <div class="q-urdu" id="q-urdu" style="display:none"></div>
    <div class="answers-grid" id="answers-grid"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<!-- ══ SCREEN 4: Results ══ -->
<div class="screen" id="screen-results">
  <div class="card">
    <div class="logo-wrap" style="margin-bottom:16px">
      <div class="logo-icon" style="width:64px;height:64px;font-size:32px">🏆</div>
      <div class="logo-title" style="font-size:24px">Well Done!</div>
      <div class="logo-sub-urdu">شاباش!</div>
    </div>
    <div style="text-align:center;font-size:16px;font-weight:700;color:#4A7A4A;margin-bottom:8px"><span id="res-name"></span></div>
    <div class="score-wrap">
      <div class="score-ring" id="score-ring" style="--pct:0%">
        <div class="score-inner">
          <div class="score-pct" id="res-pct">0%</div>
          <div class="score-lbl" id="res-frac">0/0</div>
        </div>
      </div>
    </div>
    <div class="result-badge" id="res-badge">✅ PASSED</div>
    <div class="done-card">
      <div class="icon">👩‍🏫</div>
      <div class="msg">Please hand the tablet to your teacher</div>
      <div class="urdu">براہ کرم ٹیبلیٹ استاد کو دیں</div>
    </div>
    <button class="btn-primary" onclick="resetPortal()" style="margin-top:16px;background:linear-gradient(135deg,#4A6B4A,#2E4E2E)">
      New Student — نیا طالب علم
    </button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// SVG ILLUSTRATIONS — fully inline, zero internet needed
// ══════════════════════════════════════════════════════════

const SVGS = {

  four_balls: `<svg viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg">

    ${[[55,45],[100,45],[145,45],[55,95],[100,95],[145,95]].map(([cx,cy])=>`<circle cx="${cx}" cy="${cy}" r="15" fill="white"/>`).join('')}
  </svg>`,

  plus_sign: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

  </svg>`,

  minus_sign: `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

// SESSION STATE
// ══════════════════════════════════════════════════════════
let session = { subject:'Math', studentName:'', questions:[], currentQ:0, score:0, answered:false };

function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function selectSubject(subj, el) {
  session.subject = subj;
  document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}

// ── Start ────────────────────────────────────────────────
async function startAssessment() {
  const pin  = document.getElementById('pin-input').value.trim();
  const name = document.getElementById('name-input').value.trim();
  const err  = document.getElementById('setup-error');
  err.classList.remove('show');

  if (!pin || pin.length < 4) { err.textContent = 'Please enter a valid PIN.'; err.classList.add('show'); return; }
  if (!name || name.length < 2) { err.textContent = 'Please enter the student\'s full name.'; err.classList.add('show'); return; }

  show('screen-loading');
  session.studentName = name;
  session.currentQ    = 0;
  session.score       = 0;

  // Shuffle questions
  const bank = [...(QUESTION_BANKS[session.subject] || QUESTION_BANKS.Math)];
  for (let i = bank.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [bank[i],bank[j]]=[bank[j],bank[i]]; }
  session.questions = bank.slice(0, 10);

  // Optional: notify backend
  try {
    await fetch('/portal/session/start', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pin, studentName: name })
    });
  } catch(e) {}

  document.getElementById('strip-name').textContent = name;
  document.getElementById('strip-sub').textContent  = `${session.subject} • Picture Assessment`;
  document.getElementById('student-strip').style.display = 'flex';

  showQuestion(0);
  show('screen-question');
}

// ── Render question ──────────────────────────────────────
function showQuestion(idx) {
  session.answered = false;
  const q     = session.questions[idx];
  const total = session.questions.length;

  document.getElementById('q-num').textContent    = idx + 1;
  document.getElementById('q-total').textContent  = total;
  document.getElementById('prog-fill').style.width = `${(idx/total)*100}%`;

  // SVG image
  const imgBox = document.getElementById('image-box');
  imgBox.innerHTML = SVGS[q.img] || `<div style="font-size:80px">${q.img}</div>`;

  // Question text
  const [qEn, qUr] = q.q.split(' / ');
  document.getElementById('q-text').textContent = qEn || q.q;
  const urDiv = document.getElementById('q-urdu');
  if (qUr) { urDiv.textContent = qUr; urDiv.style.display = 'block'; }
  else { urDiv.style.display = 'none'; }

  // Options
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  const labels = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const [optEn, optUr] = opt.split(' / ');
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="ans-label">${labels[i]}</span><span class="ans-text">${optEn||opt}</span>${optUr?`<span class="ans-urdu">${optUr}</span>`:''}`;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('btn-next').classList.remove('show');
}

// ── Answer ───────────────────────────────────────────────
function selectAnswer(idx) {
  if (session.answered) return;
  session.answered = true;

  const q      = session.questions[session.currentQ];
  const isRight = idx === q.ans;
  if (isRight) session.score++;

  document.querySelectorAll('.ans-btn').forEach(btn => {
    const i = parseInt(btn.dataset.idx);
    if (i === q.ans)  btn.classList.add('correct');
    else if (i === idx && !isRight) btn.classList.add('wrong');
  });

  const fb = document.getElementById('feedback');
  if (isRight) { fb.textContent = '✅ Correct! — درست جواب 🌟'; fb.className = 'feedback correct-fb'; }
  else { fb.textContent = `❌ Wrong! — غلط جواب`; fb.className = 'feedback wrong-fb'; }

  const nxt = document.getElementById('btn-next');
  nxt.textContent = session.currentQ >= session.questions.length - 1 ? '🎓 See Results' : 'Next Picture →';
  nxt.classList.add('show');
}

// ── Next ─────────────────────────────────────────────────
function nextQuestion() {
  session.currentQ++;
  if (session.currentQ < session.questions.length) {
    showQuestion(session.currentQ);
    window.scrollTo(0,0);
  } else {
    showResults();
  }
}

// ── Results ──────────────────────────────────────────────
function showResults() {
  const total = session.questions.length;
  const pct   = Math.round((session.score / total) * 100);
  const passed = pct >= 70;

  document.getElementById('res-name').textContent = session.studentName;
  document.getElementById('res-pct').textContent  = pct + '%';
  document.getElementById('res-frac').textContent = `${session.score}/${total}`;
  document.getElementById('score-ring').style.setProperty('--pct', pct + '%');

  const badge = document.getElementById('res-badge');
  badge.textContent = passed ? '✅ PASSED — کامیاب 🌟' : '📚 Keep Trying — مزید کوشش کریں';
  badge.className   = `result-badge ${passed ? 'passed' : 'failed'}`;

  document.getElementById('student-strip').style.display = 'none';
  show('screen-results');
}

// ── Reset ─────────────────────────────────────────────────
function resetPortal() {
  session = { subject:'Math', studentName:'', questions:[], currentQ:0, score:0, answered:false };
  document.getElementById('name-input').value  = '';
  document.getElementById('pin-input').value   = '';
  document.getElementById('setup-error').classList.remove('show');
  document.getElementById('student-strip').style.display = 'none';
  document.querySelectorAll('.subj-btn').forEach((b,i)=>b.classList.toggle('selected',i===0));
  show('screen-setup');
}

// Keyboard support
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('name-input').addEventListener('keydown', e => { if(e.key==='Enter') startAssessment(); });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('screen-question').classList.contains('active')) return;
    const map = {'a':0,'b':1,'c':2,'d':3,'A':0,'B':1,'C':2,'D':3};
    if (map[e.key] !== undefined) selectAnswer(map[e.key]);
    if (e.key === 'Enter' || e.key === ' ') { const btn = document.getElementById('btn-next'); if(btn.classList.contains('show')) nextQuestion(); }
  });
});
</script>
