<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKMIL — Coordinator Portal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #F0F4F8; min-height: 100vh; }

.header {
  background: #1a3a2a; color: white; padding: 14px 24px;
  display: flex; align-items: center; gap: 12px;
}
.header .logo { font-size: 20px; font-weight: 700; color: #4ade80; }
.header .subtitle { font-size: 13px; opacity: 0.7; }

.container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

/* LOGIN */
#login-screen {
  max-width: 420px; margin: 60px auto;
  background: white; border-radius: 16px;
  padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
#login-screen h2 { font-size: 22px; color: #1a3a2a; margin-bottom: 6px; }
#login-screen p { color: #64748b; font-size: 14px; margin-bottom: 24px; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
.field select, .field input {
  width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
  border-radius: 8px; font-size: 15px; color: #1e293b;
  background: white; outline: none; transition: border-color 0.2s;
}
.field select:focus, .field input:focus { border-color: #16a34a; }

.btn-primary {
  width: 100%; padding: 12px; background: #16a34a; color: white;
  border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: background 0.2s;
}
.btn-primary:hover { background: #15803d; }
.btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }

/* DASHBOARD */
#dashboard { display: none; }

.welcome-bar {
  background: white; border-radius: 12px; padding: 16px 20px;
  margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.welcome-bar .name { font-weight: 700; font-size: 17px; color: #1a3a2a; }
.welcome-bar .region { font-size: 13px; color: #64748b; }
.btn-logout { background: none; border: 1.5px solid #e2e8f0; padding: 6px 14px;
  border-radius: 8px; font-size: 13px; cursor: pointer; color: #64748b; }
.btn-logout:hover { background: #f1f5f9; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:600px) { .grid2 { grid-template-columns: 1fr; } }

.card {
  background: white; border-radius: 12px; padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.card h3 { font-size: 15px; font-weight: 700; color: #1a3a2a; margin-bottom: 14px;
  padding-bottom: 10px; border-bottom: 1.5px solid #f1f5f9; }

/* PIN GENERATOR */
#pin-form { display: grid; gap: 14px; }

.pin-result {
  background: #f0fdf4; border: 2px solid #16a34a; border-radius: 12px;
  padding: 20px; text-align: center; display: none; margin-top: 4px;
}
.pin-result .pin-code {
  font-size: 36px; font-weight: 800; color: #16a34a; letter-spacing: 6px;
  font-family: monospace;
}
.pin-result .pin-meta { font-size: 13px; color: #64748b; margin-top: 6px; }
.pin-result .pin-label { font-size: 14px; color: #1a3a2a; font-weight: 600; margin-top: 8px; }
.whatsapp-status { margin-top: 10px; font-size: 13px; padding: 6px 12px;
  border-radius: 6px; display: inline-block; }
.whatsapp-status.sent { background: #dcfce7; color: #15803d; }
.whatsapp-status.pending { background: #fef9c3; color: #854d0e; }

/* RECENT PINS TABLE */
.pins-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.pins-table th { text-align: left; padding: 8px 10px; color: #64748b;
  border-bottom: 1.5px solid #f1f5f9; font-weight: 600; }
.pins-table td { padding: 8px 10px; border-bottom: 1px solid #f8fafc; color: #374151; }
.pins-table tr:hover td { background: #f8fafc; }
.badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-active { background: #dcfce7; color: #15803d; }
.badge-expired { background: #f1f5f9; color: #94a3b8; }
.badge-used { background: #dbeafe; color: #1d4ed8; }

.loading { text-align: center; padding: 20px; color: #94a3b8; font-size: 14px; }
.error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
  padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>

let currentRC = null;

document.getElementById('assessment-date').value = new Date().toISOString().split('T')[0];

function doLogin() {
  const sel = document.getElementById('rc-select').value;
  const pwd = document.getElementById('rc-password').value;
  const err = document.getElementById('login-error');
  
  if (!sel) { err.style.display='block'; err.textContent='Please select your name.'; return; }
  if (pwd !== 'takmil123') { err.style.display='block'; err.textContent='Incorrect password.'; return; }
  
  err.style.display = 'none';
  const [id, name, region] = sel.split('|');
  currentRC = { id, name, region };
  
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('welcome-name').textContent = name;
  document.getElementById('welcome-region').textContent = region + ' Region';
  
  loadCoordinators();
  loadRecentPins();
}

function doLogout() {
  currentRC = null;
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('rc-select').value = '';
  document.getElementById('rc-password').value = '';
  document.getElementById('pin-result').style.display = 'none';
}

function loadCoordinators() {

  const scs = COORDINATORS[currentRC.id].scs;
  scs.forEach(sc => {
    sel.innerHTML += `<option value="${sc.id}">${sc.name}</option>`;
  });
}

function loadSchools() {
  const scId = parseInt(document.getElementById('sc-select').value);
  const sel = document.getElementById('school-select');
  sel.innerHTML = '<option value="">-- Select School --</option>';
  if (!scId) return;
  const schools = SCHOOLS[scId] || [];
  schools.forEach(s => {
    sel.innerHTML += `<option value="${s}">${s}</option>`;
  });
}

async function generatePIN() {
  const sc = document.getElementById('sc-select').value;
  const school = document.getElementById('school-select').value;
  const level = document.getElementById('level-select').value;
  const date = document.getElementById('assessment-date').value;
  const phone = document.getElementById('teacher-phone').value;
  const errDiv = document.getElementById('gen-error');

  if (!sc || !school || !level || !date) {
    errDiv.style.display = 'block';
    errDiv.textContent = 'Please fill in all fields.';
    return;
  }

  // Check date is today
  const today = new Date().toISOString().split('T')[0];
  if (date !== today) {
    errDiv.style.display = 'block';
    errDiv.textContent = `PINs can only be generated on the assessment date (${date}). Today is ${today}.`;
    return;
  }

  errDiv.style.display = 'none';
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    // Generate PIN via Railway API
    const resp = await fetch('/admin/pins/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        schoolId: 1,  // Will be dynamic once schools are in DB
        level: parseInt(level),
        subject: 'All',
        cohortSize: 30,
        issuedBy: currentRC.name,
        teacherPhone: phone || null
      })
    });

    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to generate PIN');

    const pin = data.pin;
    const expires = new Date(data.expiresAt).toLocaleString();
    
    // Show PIN
    document.getElementById('pin-display').textContent = pin;
    document.getElementById('pin-label').textContent = `${school} — Level ${level} — All Subjects`;
    document.getElementById('pin-meta').textContent = `Valid until: ${expires}`;
    
    // WhatsApp status
    const waDiv = document.getElementById('wa-status');
    if (phone) {
      waDiv.className = 'whatsapp-status sent';
      waDiv.textContent = `WhatsApp sent to ${phone}`;
    } else {
      waDiv.className = 'whatsapp-status pending';
      waDiv.textContent = 'No phone number — copy PIN manually';
    }
    
    document.getElementById('pin-result').style.display = 'block';
    loadRecentPins();

  } catch(e) {
    errDiv.style.display = 'block';
    errDiv.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate & Send PIN';
  }
}

async function loadRecentPins() {
  const div = document.getElementById('pins-list');
  try {
    const resp = await fetch('/admin/pins/list');
    const pins = await resp.json();
    
    if (!pins.length) { div.innerHTML = '<div class="loading">No PINs yet</div>'; return; }
    
    const today = new Date().toISOString().split('T')[0];
    let html = `<table class="pins-table">
      <tr><th>PIN</th><th>Level</th><th>Issued By</th><th>Status</th><th>Date</th></tr>`;
    
    pins.slice(0, 15).forEach(p => {
      const expired = new Date(p.expires_at) < new Date();
      const badge = expired ? 'badge-expired' : (p.activated_at ? 'badge-used' : 'badge-active');
      const label = expired ? 'Expired' : (p.activated_at ? 'Used' : 'Active');
      const dt = new Date(p.created_at).toLocaleDateString();
      html += `<tr>
        <td><strong style="font-family:monospace">${p.pin}</strong></td>
        <td>L${p.level}</td>
        <td>${p.issued_by || '—'}</td>
        <td><span class="badge ${badge}">${label}</span></td>
        <td>${dt}</td>
      </tr>`;
    });
    
    html += '</table>';
    div.innerHTML = html;
  } catch(e) {
    div.innerHTML = '<div class="loading">Could not load PINs</div>';
  }
}
